<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f4f6fb" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0c1018" media="(prefers-color-scheme: dark)" />
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<title>Govee Control</title>
<style>
  /* ============ THEME (auto light/dark) ============ */
  :root{
    --avh:100dvh; --radius:18px;
    --bg:linear-gradient(180deg,#f5f7fc 0%,#e9edf5 100%);
    --surface:#ffffff; --surface-2:#f2f5fa;
    --ink:#0f1421; --ink-2:#475067; --ink-faint:#828ca3;
    --line:#e4e9f1; --line-strong:#d3dae6;
    --accent:#2f6bf2; --on:#15a35a; --off:#e23b48;
    --shadow-card:0 6px 20px rgba(24,38,74,.06);
    --glowop:.14;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:radial-gradient(125% 80% at 50% -10%,#19223a 0%,#0d1320 55%,#0a0e18 100%);
      --surface:#161d2c; --surface-2:#1d2536;
      --ink:#f3f6fc; --ink-2:#aab4cb; --ink-faint:#6f7b94;
      --line:#28324599; --line-strong:#36405a;
      --accent:#5e8bff; --on:#33d27e; --off:#ff5d6a;
      --shadow-card:0 10px 30px rgba(0,0,0,.4);
      --glowop:.32;
    }
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:var(--avh); color:var(--ink); overflow:hidden;
    font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif; font-size:16px; line-height:1.5;
    background:var(--bg); background-attachment:fixed}
  body{display:flex; flex-direction:column}
  /* ---------- top bar ---------- */
  header{position:sticky; top:0; z-index:20; flex:0 0 auto; display:flex; flex-direction:column; gap:11px;
    padding:calc(11px + env(safe-area-inset-top)) 16px 12px; border-bottom:1px solid var(--line);
    background:color-mix(in srgb,var(--surface) 86%, transparent);
    backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px)}
  .appbar{display:flex; align-items:center; gap:10px}
  .brand{flex:1; display:flex; align-items:center; gap:11px; font-size:20px; font-weight:750; letter-spacing:-.4px; color:var(--ink)}
  .logo{width:30px;height:30px;border-radius:10px;background:
    conic-gradient(from 210deg,#ff5e5e,#ffd166,#39d98a,#4f7cff,#b66bff,#ff5e5e);
    box-shadow:0 2px 10px rgba(120,140,255,.4)}
  .icon{appearance:none; border:1px solid var(--line-strong); background:var(--surface-2); color:var(--ink);
    width:40px; height:40px; border-radius:6px; font-size:18px; cursor:pointer; transition:transform .15s}
  .icon:active{transform:scale(.94)}
  .actions{display:flex; border:1px solid var(--line-strong); border-radius:6px; overflow:hidden; background:var(--surface-2)}
  .act{flex:1; appearance:none; border:0; border-left:1px solid var(--line-strong); background:transparent; color:var(--ink);
    font:600 14px 'Inter',system-ui; padding:12px 6px; border-radius:0; cursor:pointer; text-decoration:none;
    display:flex; align-items:center; justify-content:center; transition:background .15s}
  .act:first-child{border-left:0}
  .act:active{background:var(--line)}
  .act.on{color:var(--on); background:color-mix(in srgb,var(--on) 13%,var(--surface))}
  .act.off{color:var(--off); background:color-mix(in srgb,var(--off) 11%,var(--surface))}
  /* ---------- scroll body ---------- */
  main{flex:1 1 auto; overflow:auto; padding:18px 16px 34px; -webkit-overflow-scrolling:touch}
  .grpttl{font-size:17px; font-weight:700; color:var(--ink); margin:24px 4px 13px; letter-spacing:-.3px;
    display:flex; align-items:center; gap:10px}
  .grpttl:first-child{margin-top:4px}
  .grpttl .gcount{font-size:13px; font-weight:500; color:var(--ink-faint)}
  .grpttl .gtoggle{margin-left:auto; display:flex; gap:7px}
  .mini{appearance:none; border:1px solid var(--line-strong); background:var(--surface); color:var(--ink-2);
    font:600 13px 'Inter',system-ui; padding:6px 13px; border-radius:10px; cursor:pointer}
  .mini:active{transform:scale(.95)}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px}
  /* ---------- per-group global controls ---------- */
  .gctrl{display:flex; align-items:center; gap:14px; margin:0 4px 15px; flex-wrap:wrap}
  .gctrl input[type=range]{flex:1; min-width:130px; max-width:280px; height:7px}
  .gctrl .gswatches{display:flex; gap:9px}
  .gctrl .swatch{width:24px;height:24px}
  /* ---------- light card ---------- */
  .card{position:relative; border:1px solid var(--line); border-radius:var(--radius);
    background:var(--surface); padding:17px; overflow:hidden; box-shadow:var(--shadow-card);
    transition:border-color .3s, box-shadow .3s, transform .15s}
  .card.on{border-color:color-mix(in srgb,var(--cardc,#3a6df0) 55%, var(--line));
    box-shadow:0 10px 30px -12px color-mix(in srgb,var(--cardc,#3a6df0) 60%, transparent)}
  .card.offline{opacity:.55}
  .card .glow{position:absolute; inset:auto -30% -70% -30%; height:150px; filter:blur(50px);
    background:var(--cardc,#3a6df0); opacity:0; transition:opacity .3s; pointer-events:none}
  .card.on .glow{opacity:var(--glowop)}
  .crow{position:relative; display:flex; align-items:flex-start; gap:11px; z-index:1}
  .cname{font-weight:650; font-size:17px; line-height:1.2; letter-spacing:-.2px; color:var(--ink)}
  .csku{font-size:12.5px; color:var(--ink-faint); margin-top:3px}
  .dot{width:9px;height:9px;border-radius:50%; background:var(--ink-faint); margin-top:7px; flex:0 0 auto}
  .dot.online{background:var(--on); box-shadow:0 0 8px color-mix(in srgb,var(--on) 70%,transparent)}
  .dot.off2{background:var(--off); box-shadow:0 0 8px color-mix(in srgb,var(--off) 70%,transparent)}
  /* power switch */
  .pwr{margin-left:auto; flex:0 0 auto}
  .sw{width:54px;height:32px;border-radius:6px;border:1px solid var(--line-strong);
    background:var(--surface-2); position:relative; cursor:pointer; transition:.25s}
  .sw .knob{position:absolute; top:3px; left:3px; width:24px;height:24px;border-radius:4px;
    background:var(--ink-faint); transition:left .25s, background .25s; box-shadow:0 1px 4px rgba(0,0,0,.25)}
  .card.on .sw{background:color-mix(in srgb,var(--on) 22%,var(--surface)); border-color:color-mix(in srgb,var(--on) 55%,transparent)}
  .card.on .sw .knob{left:27px; background:var(--on)}
  .card.offline .sw{cursor:not-allowed}
  /* brightness */
  .ctl{position:relative; z-index:1; margin-top:16px}
  .lbl{display:flex; justify-content:space-between; font-size:13px; color:var(--ink-2);
    font-weight:500; margin-bottom:9px}
  .lbl span:last-child{color:var(--ink); font-weight:600}
  input[type=range]{width:100%; appearance:none; height:7px; border-radius:2px; cursor:pointer;
    background:linear-gradient(90deg,var(--cardc,#3a6df0) var(--p,60%),var(--line-strong) var(--p,60%))}
  input[type=range]::-webkit-slider-thumb{appearance:none; width:20px;height:20px;border-radius:3px;
    background:#fff; border:none; box-shadow:0 1px 5px rgba(0,0,0,.3), 0 0 0 2px color-mix(in srgb,var(--cardc,#3a6df0) 60%, transparent)}
  input[type=range]:disabled{opacity:.4}
  /* color row */
  .colors{display:flex; align-items:center; gap:11px; flex-wrap:wrap; margin-top:16px; position:relative; z-index:1}
  .swatch{width:28px;height:28px;border-radius:4px; border:2px solid var(--line-strong); cursor:pointer; transition:transform .15s}
  .swatch:active{transform:scale(.88)}
  .swatch.sel{border-color:var(--ink); box-shadow:0 0 0 3px color-mix(in srgb,var(--ink) 13%,transparent)}
  /* native color input styled as a round, directly-clickable swatch */
  input[type=color].picker{appearance:none; -webkit-appearance:none; padding:0; cursor:pointer;
    background:conic-gradient(#ff5e5e,#ffd166,#39d98a,#4f7cff,#b66bff,#ff5e5e)}
  input[type=color].picker::-webkit-color-swatch-wrapper{padding:0; border-radius:3px}
  input[type=color].picker::-webkit-color-swatch{border:none; border-radius:3px}
  input[type=color].picker::-moz-color-swatch{border:none; border-radius:3px}
  input[type=color].picker:disabled{opacity:.4; cursor:not-allowed}
  /* footer status */
  footer{flex:0 0 auto; padding:12px 18px calc(12px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line); font-size:13px; color:var(--ink-2);
    display:flex; align-items:center; gap:10px; background:var(--surface)}
  footer .live{display:flex;align-items:center;gap:7px}
  footer .pulse{width:8px;height:8px;border-radius:50%;background:var(--on);box-shadow:0 0 10px var(--on);
    animation:pls 2s ease-in-out infinite}
  @keyframes pls{0%,100%{opacity:1}50%{opacity:.35}}
  .badge{margin-left:auto; padding:4px 11px;border-radius:9px;
    background:color-mix(in srgb,#f5a623 15%,var(--surface));color:#b9760a;
    font-weight:600;font-size:12px; border:1px solid color-mix(in srgb,#f5a623 35%,transparent)}
  @media (prefers-color-scheme: dark){ .badge{color:#ffd166} }
  .empty{color:var(--ink-2); text-align:center; padding:60px 20px; font-size:15px}
  /* ---------- bento dashboard ---------- */
  .summary{font-size:14px; color:var(--ink-2); font-weight:500; margin:2px 4px 16px}
  .bento{display:grid; grid-template-columns:1fr; gap:14px; grid-auto-flow:dense}
  @media (min-width:640px){ .bento{grid-template-columns:repeat(2,minmax(0,1fr))} .tile.wide{grid-column:span 2} }
  @media (min-width:1080px){ .bento{grid-template-columns:repeat(3,minmax(0,1fr))} }
  .tile{position:relative; display:flex; flex-direction:column; gap:13px; overflow:hidden;
    background:var(--surface); border:1px solid var(--line); border-radius:6px; padding:16px 17px; box-shadow:var(--shadow-card)}
  .thead{display:flex; align-items:center; gap:11px}
  .tname{flex:1; font-size:16.5px; font-weight:700; letter-spacing:-.3px; color:var(--ink);
    display:flex; align-items:baseline; gap:9px; min-width:0}
  .tname .tcount{font-size:12.5px; font-weight:500; color:var(--ink-faint)}
  /* group master toggle */
  .gsw{width:52px;height:30px;border-radius:6px;border:1px solid var(--line-strong); background:var(--surface-2);
    position:relative; cursor:pointer; flex:0 0 auto; transition:.25s}
  .gsw .gk{position:absolute; top:3px; left:3px; width:22px;height:22px;border-radius:4px;
    background:var(--ink-faint); transition:left .25s, background .25s; box-shadow:0 1px 4px rgba(0,0,0,.25)}
  .gsw.on{background:color-mix(in srgb,var(--on) 24%,var(--surface)); border-color:color-mix(in srgb,var(--on) 55%,transparent)}
  .gsw.on .gk{left:25px; background:var(--on)}
  .tctrl{display:flex; align-items:center; gap:13px; flex-wrap:wrap}
  .tctrl input[type=range]{flex:1; min-width:120px; height:7px}
  .tswatch{display:flex; align-items:center; gap:9px; flex-wrap:wrap}
  /* light chips inside a tile */
  .lites{display:grid; grid-template-columns:1fr; gap:10px}
  @media (min-width:520px){ .tile.wide .lites{grid-template-columns:1fr 1fr} }
  .lite{background:var(--surface-2); border:1px solid var(--line); border-radius:5px; padding:12px 13px;
    display:flex; flex-direction:column; gap:11px; transition:border-color .3s}
  .lite.on{border-color:color-mix(in srgb,var(--litec,#3a6df0) 50%,var(--line))}
  .lite.offline{opacity:.5}
  .literow{display:flex; align-items:center; gap:10px}
  .litedot{width:12px;height:12px;border-radius:3px;flex:0 0 auto;background:var(--litec,#888);
    box-shadow:0 0 8px color-mix(in srgb,var(--litec,#888) 60%,transparent)}
  .litename{flex:1; min-width:0; font-size:14.5px; font-weight:600; color:var(--ink);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .literow2{display:flex; align-items:center; gap:11px}
  .literow2 input[type=range]{flex:1; height:6px}
  .lite .sw{width:46px;height:26px}
  .lite .sw .knob{width:20px;height:20px;top:2px;left:2px}
  .lite.on .sw{background:color-mix(in srgb,var(--on) 22%,var(--surface)); border-color:color-mix(in srgb,var(--on) 55%,transparent)}
  .lite.on .sw .knob{left:22px; background:var(--on)}
  .literow2 .picker{width:26px;height:26px;flex:0 0 auto}
  /* toast */
  #toast{position:fixed; left:50%; bottom:78px; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:var(--surface);
    padding:13px 22px; border-radius:6px; font-weight:600; font-size:14.5px; opacity:0;
    transition:opacity .25s, transform .25s; pointer-events:none; z-index:50; max-width:88vw;
    box-shadow:0 12px 40px -10px rgba(0,0,0,.4)}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  #toast.err{background:var(--off); color:#fff}
</style>
</head>
<body>
  <header>
    <div class="appbar">
      <div class="brand"><span class="logo"></span> Govee Control</div>
      <button class="icon" data-act="refresh" title="Refresh">⟳</button>
    </div>
    <div class="actions">
      <button class="act on" data-act="allon">All On</button>
      <button class="act off" data-act="alloff">All Off</button>
      <button class="act" data-act="groups">Groups</button>
      <a class="act" href="scenes.html">Scenes</a>
    </div>
  </header>

  <main id="app"><div class="empty">Loading lights…</div></main>

  <footer>
    <span class="live"><span class="pulse"></span><span id="status">Connecting…</span></span>
    <span id="updated"></span>
    <span class="badge" id="modebadge">MOCK DATA</span>
  </footer>

  <div id="toast"></div>

<script>
/* ============================================================
   CONFIG  — flip USE_MOCK to false once the Railway proxy is up.
   The proxy holds the Govee-API-Key; the browser never sees it.
   ============================================================ */
const CONFIG = (() => {
  // Connection details live in localStorage (set via the ⚙ Settings dialog),
  // so going live needs no code edit and no secret committed to the repo.
  // Mock mode stays on until a proxy URL is saved.
  let s = {}; try { s = JSON.parse(localStorage.getItem("gv_cfg") || "{}"); } catch {}
  const sameOrigin = location.protocol.startsWith("http") ? location.origin : "";
  const PROXY_BASE = (s.proxyBase || sameOrigin).replace(/\/+$/, "");
  return {
    USE_MOCK: !(s.live || s.proxyBase),   // demo until the user saves real settings
    PROXY_BASE,
    PASSCODE: s.passcode || "",
    POLL_MS: 45000,            // state auto-refresh interval
  };
})();

/* ============================================================
   API LAYER  — same method names whether mock or live.
   Mock data is shaped exactly like Govee Cloud API v2 responses,
   so going live is just CONFIG.USE_MOCK = false.
   ============================================================ */
const Govee = (() => {
  // ---- helpers shared by both backends ----
  const rgbToInt = (r,g,b) => (r<<16)|(g<<8)|b;
  const intToRgb = n => ({ r:(n>>16)&255, g:(n>>8)&255, b:n&255 });

  // ---------- MOCK backend ----------
  const mockDevices = [
    dev("Living Room Lamp","H6008","Living Room", true, true, 70, [255,180,90]),
    dev("TV Backlight","H6199","Living Room", true, true, 100, [80,120,255]),
    dev("Kitchen Strip","H6125","Kitchen", true, false, 55, [255,255,255]),
    dev("Bedroom Bulb","H6009","Bedroom", true, true, 30, [255,120,160]),
    dev("Backyard Flood","H7060","Backyard", true, false, 90, [120,255,160]),
    dev("Garage Strip","H619A","Backyard", false, false, 60, [255,255,255]), // offline
  ];
  function dev(name,sku,room,online,on,bri,rgb){
    return { sku, device:"MOCK:"+name.replace(/\W+/g,""), deviceName:name, room,
      type:"devices.types.light", online,
      _state:{ on, brightness:bri, color:rgbToInt(...rgb) },
      capabilities:[
        {type:"devices.capabilities.on_off",instance:"powerSwitch"},
        {type:"devices.capabilities.range",instance:"brightness",parameters:{range:{min:1,max:100}}},
        {type:"devices.capabilities.color_setting",instance:"colorRgb"},
      ]};
  }
  const wait = ms => new Promise(r=>setTimeout(r,ms));

  async function mockList(){
    await wait(350);
    return mockDevices.map(d => ({ ...d }));
  }
  async function mockState(deviceId){
    await wait(120);
    const d = mockDevices.find(x=>x.device===deviceId);
    return d ? { online:d.online, ...d._state } : null;
  }
  async function mockControl(deviceId, capability, instance, value){
    await wait(180);
    const d = mockDevices.find(x=>x.device===deviceId);
    if(!d) throw new Error("device not found");
    if(!d.online) throw new Error("device offline");
    if(instance==="powerSwitch") d._state.on = !!value;
    if(instance==="brightness")  d._state.brightness = value;
    if(instance==="colorRgb")    d._state.color = value;
    return { ok:true };
  }

  // ---------- LIVE backend (Railway proxy) ----------
  async function call(path, body){
    const res = await fetch(CONFIG.PROXY_BASE + path, {
      method: body ? "POST":"GET",
      headers: { "Content-Type":"application/json", "X-Passcode": CONFIG.PASSCODE },
      body: body ? JSON.stringify(body) : undefined,
    });
    if(!res.ok) throw new Error("proxy "+res.status);
    return res.json();
  }
  async function liveList(){ return (await call("/govee/devices")).data; }
  async function liveState(deviceId){ return (await call("/govee/state",{device:deviceId})).data; }
  async function liveControl(deviceId, capability, instance, value){
    return call("/govee/control",{ device:deviceId, capability, instance, value });
  }

  // ---------- public ----------
  const M = CONFIG.USE_MOCK;
  return {
    rgbToInt, intToRgb,
    list:    M ? mockList    : liveList,
    state:   M ? mockState   : liveState,
    setPower:(id,on)   => (M?mockControl:liveControl)(id,"devices.capabilities.on_off","powerSwitch",on?1:0),
    setBright:(id,v)   => (M?mockControl:liveControl)(id,"devices.capabilities.range","brightness",v),
    setColor:(id,rgbInt)=>(M?mockControl:liveControl)(id,"devices.capabilities.color_setting","colorRgb",rgbInt),
  };
})();

/* ============================================================
   GROUPS API — server-synced (so groups follow you to every device).
   Mock mode keeps them in localStorage.
   ============================================================ */
const GroupsAPI = (() => {
  const M = CONFIG.USE_MOCK, KEY = "gv_groups";
  const lget = () => { try { return JSON.parse(localStorage.getItem(KEY) || "[]"); } catch { return []; } };
  const lset = v => localStorage.setItem(KEY, JSON.stringify(v));
  const call = async (path, method, body) => {
    const r = await fetch(CONFIG.PROXY_BASE + path, {
      method, headers: { "Content-Type": "application/json", "X-Passcode": CONFIG.PASSCODE },
      body: body ? JSON.stringify(body) : undefined });
    if (!r.ok) throw new Error("groups " + r.status);
    return r.json();
  };
  return {
    list:   async () => M ? lget() : ((await call("/groups", "GET")).data || []),
    add:    async name => { if (M) { const a = lget(); const g = { id: "g" + Date.now(), name, devices: [] }; a.push(g); lset(a); return g; }
                            return (await call("/groups", "POST", { name, devices: [] })).data; },
    update: async (id, patch) => { if (M) { const a = lget(); const g = a.find(x => x.id === id); if (g) Object.assign(g, patch); lset(a); return g; }
                                   return (await call("/groups/" + id, "PATCH", patch)).data; },
    remove: async id => { if (M) { lset(lget().filter(x => x.id !== id)); return; } await call("/groups/" + id, "DELETE"); },
  };
})();
let GROUPS = [];

/* ============================================================
   UI
   ============================================================ */
const PRESETS = [ // name + rgb
  ["#ffffff",255,255,255],["#ffb347",255,179,71],["#ff5e5e",255,94,94],
  ["#39d98a",57,217,138],["#4f7cff",79,124,255],["#b66bff",182,107,255],
];
let DEVICES = [];
const app = document.getElementById("app");
const $ = s => document.querySelector(s);

function cssRgb(n){ const {r,g,b}=Govee.intToRgb(n); return `rgb(${r},${g},${b})`; }
function toast(msg, isErr){
  const t=$("#toast"); t.textContent=msg; t.className = "show"+(isErr?" err":"");
  clearTimeout(t._h); t._h=setTimeout(()=>t.className="",1900);
}
function fmtTime(d){ return d.toLocaleTimeString([], {hour:"numeric",minute:"2-digit"}); }

function render(){
  if(!DEVICES.length){ app.innerHTML='<div class="empty">No lights found.</div>'; return; }
  // bucket by group; order: defined groups first, Ungrouped last
  const byGroup = {};
  DEVICES.forEach(d => (byGroup[d.room||"Ungrouped"] ||= []).push(d));
  const ordered = [
    ...GROUPS.map(g=>g.name).filter(n=>byGroup[n]),
    ...Object.keys(byGroup).filter(n=>n!=="Ungrouped" && !GROUPS.some(g=>g.name===n)),
  ];
  if(byGroup["Ungrouped"]) ordered.push("Ungrouped");

  const totalOn = DEVICES.filter(d=>d._state.on && d.online).length;
  const totalOnline = DEVICES.filter(d=>d.online).length;
  const seen = new Set();
  let tiles = "";
  for(const name of ordered){
    if(seen.has(name)) continue; seen.add(name);
    const list = byGroup[name]; if(!list) continue;
    const online = list.filter(d=>d.online);
    const onCount = online.filter(d=>d._state.on).length;
    const anyOn = onCount>0;
    const avg = online.length ? Math.round(online.reduce((s,d)=>s+d._state.brightness,0)/online.length) : 60;
    const wide = list.length>=3;
    const presets = PRESETS.map(([hex,r,g,b])=>
      `<span class="swatch" style="background:${hex}" data-grpcolor="${Govee.rgbToInt(r,g,b)}" data-grp="${name}"></span>`).join("");
    tiles += `<div class="tile ${wide?'wide':''}">
        <div class="thead">
          <span class="tname">${name} <span class="tcount">${onCount}/${list.length} on</span></span>
          <div class="gsw ${anyOn?'on':''}" data-grptoggle="${name}" role="switch" aria-checked="${anyOn}"><span class="gk"></span></div>
        </div>
        <div class="tctrl">
          <input type="range" min="1" max="100" value="${avg}" data-grpbri="${name}" style="--p:${avg}%">
          <span class="tswatch">${presets}<input type="color" class="swatch picker" data-grppick="${name}" value="#ffffff" title="Custom color for ${name}"></span>
        </div>
        <div class="lites">${list.map(liteHTML).join("")}</div>
      </div>`;
  }
  app.innerHTML =
    `<div class="summary">${totalOn} of ${totalOnline} lights on · ${ordered.length} ${ordered.length===1?'group':'groups'}</div>`
    + `<div class="bento">${tiles}</div>`;
}

// compact light "chip": colored dot + name + toggle, with brightness + custom color
function liteHTML(d){
  const c = cssRgb(d._state.color);
  const on = d._state.on && d.online;
  const bri = d._state.brightness;
  return `<div class="lite ${on?'on':''} ${d.online?'':'offline'}" style="--litec:${c}">
    <div class="literow">
      <span class="litedot"></span>
      <span class="litename">${d.deviceName}</span>
      <div class="sw" data-pwr="${d.device}" role="switch" aria-checked="${on}"><span class="knob"></span></div>
    </div>
    <div class="literow2">
      <input type="range" min="1" max="100" value="${bri}" data-bri="${d.device}" style="--p:${bri}%" ${d.online?'':'disabled'}>
      <input type="color" class="swatch picker" value="${rgbHex(d._state.color)}" data-pick="${d.device}" title="Color" ${d.online?'':'disabled'}>
    </div>
  </div>`;
}
function rgbHex(n){ const {r,g,b}=Govee.intToRgb(n);
  return "#"+[r,g,b].map(x=>x.toString(16).padStart(2,"0")).join(""); }
function hexInt(hex){ const n=parseInt(hex.slice(1),16); return n; }

/* ---------- interactions (event delegation) ---------- */
async function safe(fn, optimistic){
  try{ optimistic && optimistic(); await fn(); }
  catch(e){ toast(e.message||"Failed", true); load(); /* resync truth */ }
}
app.addEventListener("click", e=>{
  const pwr = e.target.closest("[data-pwr]");
  if(pwr){ const d = byId(pwr.dataset.pwr); if(!d.online) return toast("Light is offline",true);
    const next = !d._state.on;
    return safe(()=>Govee.setPower(d.device,next), ()=>{ d._state.on=next; render(); });
  }
  const sw = e.target.closest("[data-color]");
  if(sw){ const d = byId(sw.dataset.dev); const v = +sw.dataset.color;
    return safe(()=>Govee.setColor(d.device,v), ()=>{ d._state.color=v; render(); });
  }
  const gtog = e.target.closest("[data-grptoggle]");
  if(gtog){ const name=gtog.dataset.grptoggle; const online=DEVICES.filter(d=>d.room===name && d.online);
    const want = !online.some(d=>d._state.on);   // any on -> turn all off, else all on
    online.forEach(d=>{ d._state.on=want; Govee.setPower(d.device,want).catch(()=>{}); });
    render(); toast(`${name}: all ${want?'on':'off'}`); return;
  }
  const gcol = e.target.closest("[data-grpcolor]");
  if(gcol){ const v=+gcol.dataset.grpcolor; const name=gcol.dataset.grp;
    DEVICES.filter(d=>d.room===name && d.online).forEach(d=>{ d._state.color=v; Govee.setColor(d.device,v).catch(()=>{}); });
    render(); toast(`${name}: color set`); return;
  }
});
app.addEventListener("input", e=>{
  const bri = e.target.closest("[data-bri]");
  if(bri){ const d=byId(bri.dataset.bri); const v=+bri.value;
    d._state.brightness=v; bri.style.setProperty("--p",v+"%");
    const lbl=bri.closest(".ctl")?.querySelector(".lbl span:last-child"); if(lbl) lbl.textContent=v+"%";
    clearTimeout(d._briT); d._briT=setTimeout(()=>{
      safe(()=>Govee.setBright(d.device,v));
    },220); // debounce while dragging
  }
  const pick = e.target.closest("[data-pick]");
  if(pick){ const d=byId(pick.dataset.pick); const v=hexInt(pick.value);
    d._state.color=v; clearTimeout(d._colT); d._colT=setTimeout(()=>{
      safe(()=>Govee.setColor(d.device,v), ()=>render());
    },220);
  }
  const gbri = e.target.closest("[data-grpbri]");
  if(gbri){ const v=+gbri.value; const name=gbri.dataset.grpbri; gbri.style.setProperty("--p",v+"%");
    DEVICES.filter(d=>d.room===name && d.online).forEach(d=>d._state.brightness=v);
    clearTimeout(gbri._t); gbri._t=setTimeout(()=>{
      DEVICES.filter(d=>d.room===name && d.online).forEach(d=>Govee.setBright(d.device,v).catch(()=>{}));
    },250); // debounce while dragging the group slider
  }
  const gpick = e.target.closest("[data-grppick]");
  if(gpick){ const v=hexInt(gpick.value); const name=gpick.dataset.grppick;
    DEVICES.filter(d=>d.room===name && d.online).forEach(d=>d._state.color=v);
    clearTimeout(gpick._t); gpick._t=setTimeout(()=>{
      DEVICES.filter(d=>d.room===name && d.online).forEach(d=>Govee.setColor(d.device,v).catch(()=>{}));
    },180);
  }
});
document.querySelector("header").addEventListener("click", e=>{
  const b=e.target.closest("[data-act]"); if(!b) return;
  const a=b.dataset.act;
  if(a==="refresh") return load();
  if(a==="groups") return openGroups();
  if(a==="allon"||a==="alloff"){ const want=a==="allon";
    DEVICES.filter(d=>d.online).forEach(d=>{ d._state.on=want; Govee.setPower(d.device,want).catch(()=>{}); });
    render(); toast(`All lights ${want?'on':'off'}`);
  }
});
const byId = id => DEVICES.find(d=>d.device===id);

/* ---------- load + poll ---------- */
async function load(){
  try{
    $("#status").textContent = "Refreshing…";
    DEVICES = await Govee.list();
    // mock list already carries _state; live list will need a state fetch per device:
    if(!CONFIG.USE_MOCK){
      await Promise.all(DEVICES.map(async d=>{
        try{ const s=await Govee.state(d.device);
          d.online = s?.online ?? true;
          d._state = { on:!!s.on, brightness:s.brightness??100, color:s.color??Govee.rgbToInt(255,255,255) };
        }catch{ d.online=false; d._state={on:false,brightness:100,color:Govee.rgbToInt(255,255,255)}; }
      }));
    }
    // assign each device to its group (server-synced); ungrouped fall to "Ungrouped"
    try{ GROUPS = await GroupsAPI.list(); }catch{ GROUPS = []; }
    const gmap = {}; GROUPS.forEach(g=>(g.devices||[]).forEach(id=>gmap[id]=g.name));
    DEVICES.forEach(d=>{ d.room = gmap[d.device] || d.room || "Ungrouped"; });
    render();
    const n = DEVICES.length, online = DEVICES.filter(d=>d.online).length;
    $("#status").textContent = `${online}/${n} online`;
    $("#updated").textContent = "· updated "+fmtTime(new Date());
  }catch(e){
    app.innerHTML = `<div class="empty">Couldn't reach the lights.<br><small>${e.message}</small></div>`;
    $("#status").textContent = "Offline";
  }
}
$("#modebadge").style.display = CONFIG.USE_MOCK ? "" : "none";
load();
setInterval(load, CONFIG.POLL_MS);

/* ============================================================
   GROUPS MANAGER  — create groups, assign lights (exclusive membership).
   Changes save to the proxy and re-render the dashboard.
   ============================================================ */
function openGroups(){
  let ov = document.getElementById("grpOverlay");
  if(!ov){
    ov = document.createElement("div"); ov.id = "grpOverlay";
    ov.style.cssText = "position:fixed;inset:0;z-index:150;display:none;align-items:center;justify-content:center;background:rgba(4,6,18,.62);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:18px";
    ov.innerHTML = '<div id="grpCard" style="width:min(460px,94vw);max-height:84vh;overflow:auto;box-sizing:border-box;background:rgba(22,26,48,.95);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:20px;color:#fff;box-shadow:0 24px 70px -20px rgba(0,0,0,.7)"></div>';
    document.body.appendChild(ov);
    ov.addEventListener("click", e=>{ if(e.target===ov) ov.style.display="none"; });
    // delegated actions inside the modal
    ov.addEventListener("change", async e=>{
      const as = e.target.closest("[data-gassign]");
      if(as){ const dev=as.dataset.gassign, gid=as.value;
        // exclusive: drop the light from any group it's in, then add to the chosen one
        for(const g of GROUPS){ if((g.devices||[]).includes(dev)){ const nd=g.devices.filter(x=>x!==dev); await GroupsAPI.update(g.id,{devices:nd}); g.devices=nd; } }
        if(gid){ const g=GROUPS.find(x=>x.id===gid); if(g){ const nd=(g.devices||[]).concat(dev); await GroupsAPI.update(gid,{devices:nd}); g.devices=nd; } }
        renderGroupsModal(); load(); return;
      }
      const rn = e.target.closest("[data-grename]");
      if(rn){ await GroupsAPI.update(rn.dataset.grename,{name:rn.value.trim()||"Group"}); GROUPS=await GroupsAPI.list(); renderGroupsModal(); load(); return; }
    });
    ov.addEventListener("click", async e=>{
      const del = e.target.closest("[data-grdel]");
      if(del){ await GroupsAPI.remove(del.dataset.grdel); GROUPS=await GroupsAPI.list(); renderGroupsModal(); load(); return; }
    });
  }
  ov.style.display = "flex";
  renderGroupsModal();
}
async function renderGroupsModal(){
  const card = document.getElementById("grpCard");
  try{ GROUPS = await GroupsAPI.list(); }catch{ GROUPS = []; }
  const esc = s => (s||"").replace(/[<>"]/g, c=>({'<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const ofDev = {}; GROUPS.forEach(g=>(g.devices||[]).forEach(id=>ofDev[id]=g.id));  // light -> its group
  const groupRows = GROUPS.length ? GROUPS.map(g=>`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <input value="${esc(g.name)}" data-grename="${g.id}" style="flex:1;box-sizing:border-box;padding:8px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:#fff;font-weight:600;font-size:14px">
        <span style="font-size:12px;color:#8a93b0;min-width:18px;text-align:center">${(g.devices||[]).length}</span>
        <button data-grdel="${g.id}" style="border:1px solid #6e2f2f;background:rgba(255,80,80,.12);color:#ff8a8a;border-radius:6px;padding:8px 12px;font-weight:600;cursor:pointer">Delete</button>
      </div>`).join("") : '<div style="color:#8a93b0;font-size:13px;padding:2px 0 8px">No groups yet — add one above.</div>';
  const optsFor = sel => `<option value=""${sel?'':' selected'}>Ungrouped</option>`+GROUPS.map(g=>`<option value="${g.id}"${g.id===sel?' selected':''}>${esc(g.name)}</option>`).join("");
  const lightRows = DEVICES.length ? DEVICES.map(d=>`
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid rgba(255,255,255,.06)">
        <span style="flex:1;min-width:0;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(d.deviceName)}</span>
        <select data-gassign="${d.device}" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:6px;color:#fff;font-size:13px;padding:7px 8px">${optsFor(ofDev[d.device])}</select>
      </div>`).join("") : '<div style="color:#8a93b0;font-size:13px">No lights loaded — open this on the live dashboard.</div>';
  card.innerHTML =
    '<div style="display:flex;align-items:center;margin-bottom:6px"><h2 style="margin:0;font-size:19px;font-weight:600;flex:1">Manage groups</h2><button id="grpClose" style="border:0;background:transparent;color:#8a93b0;font-size:20px;cursor:pointer">✕</button></div>'
    +'<p style="margin:0 0 14px;color:#aab;font-size:12.5px;line-height:1.5">Create groups, then set each light’s group below. A light belongs to one group at a time.</p>'
    +'<div style="display:flex;gap:8px;margin-bottom:18px"><input id="grpNew" placeholder="New group name (e.g. Living Room)" style="flex:1;box-sizing:border-box;padding:10px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:#fff;font-size:14px"><button id="grpAdd" style="padding:10px 16px;border-radius:6px;border:0;background:#4f7cff;color:#fff;font-weight:600;cursor:pointer">Add</button></div>'
    +'<div style="font-size:11.5px;color:#8a93b0;font-weight:700;letter-spacing:.5px;margin-bottom:9px">GROUPS</div>'+groupRows
    +'<div style="font-size:11.5px;color:#8a93b0;font-weight:700;letter-spacing:.5px;margin:18px 0 2px">ASSIGN LIGHTS</div>'+lightRows;
  card.querySelector("#grpClose").onclick = ()=> document.getElementById("grpOverlay").style.display="none";
  card.querySelector("#grpAdd").onclick = async ()=>{
    const name = card.querySelector("#grpNew").value.trim(); if(!name) return;
    await GroupsAPI.add(name); GROUPS = await GroupsAPI.list(); renderGroupsModal();
  };
}

/* ============================================================
   SETTINGS  — proxy URL + passcode, stored in localStorage (gv_cfg).
   No code edits, no secrets in the repo; shared by both pages.
   ============================================================ */
(function(){
  let cfg={}; try{ cfg=JSON.parse(localStorage.getItem("gv_cfg")||"{}"); }catch{}
  const header=document.querySelector("header"); if(!header) return;
  const gear=document.createElement("button");
  gear.title="Settings"; gear.textContent="⚙"; gear.setAttribute("data-cfg","1");
  gear.style.cssText="margin-left:6px;flex:0 0 auto;width:40px;height:40px;border-radius:6px;border:1px solid var(--line-strong,var(--line,rgba(128,128,128,.35)));background:transparent;color:inherit;font-size:18px;line-height:1;cursor:pointer";
  (header.querySelector(".appbar")||header).appendChild(gear);

  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(4,6,18,.62);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:20px";
  ov.innerHTML=
    '<div style="width:min(420px,92vw);box-sizing:border-box;background:rgba(22,26,48,.94);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:22px;color:#fff;box-shadow:0 24px 70px -20px rgba(0,0,0,.7)">'
    +'<h2 style="margin:0 0 4px;font-size:19px;font-weight:600">Connect to your lights</h2>'
    +'<p style="margin:0 0 16px;color:#aab;font-size:13px;line-height:1.5">The URL is pre-filled to this site. Enter your passcode and Save to connect to your real lights.</p>'
    +'<label style="display:block;font-size:12px;color:#ccd;margin-bottom:6px">Proxy URL</label>'
    +'<input id="cfgUrl" placeholder="https://your-app.up.railway.app" style="width:100%;box-sizing:border-box;padding:11px 13px;margin-bottom:14px;border-radius:12px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:#fff;font-size:14px">'
    +'<label style="display:block;font-size:12px;color:#ccd;margin-bottom:6px">Passcode</label>'
    +'<input id="cfgPass" type="password" placeholder="shared passcode" style="width:100%;box-sizing:border-box;padding:11px 13px;border-radius:12px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:#fff;font-size:14px">'
    +'<div id="cfgMsg" style="min-height:18px;font-size:12.5px;margin:8px 2px 14px;color:#9aa"></div>'
    +'<div style="display:flex;gap:10px">'
    +'<button id="cfgTest" style="flex:1;padding:11px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:#fff;font-weight:600;font-size:14px;cursor:pointer">Test</button>'
    +'<button id="cfgSave" style="flex:1;padding:11px;border-radius:12px;border:0;background:#4f7cff;color:#fff;font-weight:600;font-size:14px;cursor:pointer">Save</button></div>'
    +'<button id="cfgClose" style="width:100%;margin-top:10px;padding:9px;border-radius:12px;border:0;background:transparent;color:#8a93b0;font-size:13px;cursor:pointer">Cancel</button></div>';
  document.body.appendChild(ov);
  const $=s=>ov.querySelector(s), msg=$("#cfgMsg");
  const norm=v=>v.trim().replace(/\/+$/,"");
  gear.addEventListener("click",()=>{ $("#cfgUrl").value=cfg.proxyBase||(location.protocol.startsWith("http")?location.origin:""); $("#cfgPass").value=cfg.passcode||""; msg.textContent=""; ov.style.display="flex"; });
  const close=()=>ov.style.display="none";
  $("#cfgClose").addEventListener("click",close);
  ov.addEventListener("click",e=>{ if(e.target===ov) close(); });
  $("#cfgTest").addEventListener("click",async()=>{
    const base=norm($("#cfgUrl").value);
    if(!base){ msg.style.color="#9aa"; msg.textContent="No URL — staying in demo mode."; return; }
    msg.style.color="#9aa"; msg.textContent="Testing…";
    try{ const r=await fetch(base+"/health",{headers:{"X-Passcode":$("#cfgPass").value.trim()}}); const j=await r.json();
      if(j.ok){ msg.style.color="#5fd38a"; msg.textContent="Connected ✓  Govee:"+(j.govee?"on":"off")+"  AI:"+(j.ai?"on":"off")+"  automations:"+j.automations; }
      else { msg.style.color="#ffb4b4"; msg.textContent="Reached server but not OK."; }
    }catch{ msg.style.color="#ffb4b4"; msg.textContent="Couldn't reach it — check the URL / passcode."; }
  });
  $("#cfgSave").addEventListener("click",()=>{
    localStorage.setItem("gv_cfg",JSON.stringify({proxyBase:norm($("#cfgUrl").value),passcode:$("#cfgPass").value.trim(),live:true}));
    location.reload();
  });
})();

if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>

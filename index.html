<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#070610" />
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<title>Govee Control</title>
<style>
  /* ============ THEME (dark, glow-forward — Nanoleaf/Govee vibe) ============ */
  :root{
    --avh:100dvh; --radius:18px;
    --bg:radial-gradient(125% 90% at 18% -5%, #1a1230 0%, #0c0a16 52%, #060510 100%);
    --surface:#15131f; --surface-2:#201d30;
    --ink:#f4f2fa; --ink-2:#b7b3cf; --ink-faint:#7e7a97;
    --line:#2a2740; --line-strong:#3c3860;
    --accent:#8a7bff; --on:#39d98a; --off:#ff5d6a;
    --shadow-card:0 12px 34px rgba(0,0,0,.5);
    --glowop:.5;
    /* glass material: a translucent tint + a diagonal glossy sheen, layered as background */
    --glass-tint:rgba(255,255,255,.055); --glass-tint-soft:rgba(255,255,255,.035);
    --glass-border:rgba(255,255,255,.15); --glass-border-soft:rgba(255,255,255,.09);
    --sheen:linear-gradient(160deg, rgba(255,255,255,.16) 0%, rgba(255,255,255,.03) 32%, rgba(255,255,255,0) 58%);
    --blur:22px;
    /* Govee-app header gradient + accent (matches the official app's look) */
    --gv-header-grad:radial-gradient(140% 200% at 24% -60%, #8577ff 0%, #6355e0 20%, #372f8c 42%, #171335 68%, var(--surface) 100%);
    --gv-cyan:#29c3f0; --gv-cyan-2:#17a3dd;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; min-height:var(--avh); color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif; font-size:16px; line-height:1.5;
    background:var(--bg); background-attachment:fixed}
  body{display:flex; flex-direction:column}
  /* ---------- top bar ----------
     The header (brand + the 8-button grid) used to be position:sticky with
     ONLY <main> scrolling underneath it — as the grid/banner/snaps stack grew
     across several changes, that fixed chrome ate more and more of the
     screen, leaving a shrinking scrollable strip below it (jford: "only half
     the screen is scrolling"). Simplified to match the same fix already
     applied to scenes.html: nothing is pinned, the WHOLE page (header, grid,
     banner, snaps, lights) scrolls together as one normal unit. */
  header{z-index:20; flex:0 0 auto; display:flex; flex-direction:column; gap:11px;
    padding:calc(11px + env(safe-area-inset-top)) 16px 16px; border-bottom-left-radius:22px; border-bottom-right-radius:22px;
    background:var(--gv-header-grad); box-shadow:0 10px 30px -10px rgba(70,50,220,.35)}
  .appbar{display:flex; align-items:center; gap:10px}
  .brand{flex:1; display:flex; align-items:center; gap:11px; font-size:20px; font-weight:750; letter-spacing:-.4px; color:var(--ink)}
  .logo{width:30px;height:30px;border-radius:10px;background:
    conic-gradient(from 210deg,#ff5e5e,#ffd166,#39d98a,#4f7cff,#b66bff,#ff5e5e);
    box-shadow:0 2px 10px rgba(120,140,255,.4), inset 0 1px 1px rgba(255,255,255,.5)}
  .icon{appearance:none; border:1px solid var(--glass-border); color:var(--ink);
    background:var(--sheen), var(--glass-tint); backdrop-filter:blur(var(--blur)); -webkit-backdrop-filter:blur(var(--blur));
    width:42px; height:42px; border-radius:13px; font-size:18px; cursor:pointer; transition:transform .15s;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.14)}
  .icon:active{transform:scale(.92)}
  .actions{display:flex; gap:8px}
  .act{flex:1; appearance:none; border:1px solid var(--glass-border); color:var(--ink);
    background:var(--sheen), var(--glass-tint); backdrop-filter:blur(var(--blur)); -webkit-backdrop-filter:blur(var(--blur));
    font:650 14.5px 'Inter',system-ui; padding:13px 6px; border-radius:14px; cursor:pointer; text-decoration:none;
    display:flex; align-items:center; justify-content:center; gap:6px; transition:transform .15s, background .2s;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.14)}
  .act:active{transform:scale(.96)}
  .act.on{color:#7cf5b8; background:var(--sheen), color-mix(in srgb,var(--on) 22%,var(--glass-tint)); border-color:color-mix(in srgb,var(--on) 45%,var(--glass-border))}
  .act.off{color:#ff9aa4; background:var(--sheen), color-mix(in srgb,var(--off) 20%,var(--glass-tint)); border-color:color-mix(in srgb,var(--off) 45%,var(--glass-border))}
  /* home screen: one 2-column grid of large buttons for every major section
     (Scenes/Timers/Triggers/Groups/On-Off/Settings/Refresh) — replaces the
     old thin nav-pills + actions-row header strip (jford: "the app should
     feature 2 columns with different options... lights, settings... in each
     button"). The small header gear (injected by the Settings module) stays
     in the DOM so its click logic is reused, just hidden — the grid's
     Settings button forwards a click to it instead of duplicating the modal. */
  .home-grid{display:grid; grid-template-columns:1fr 1fr; gap:7px}
  .home-btn{appearance:none; border:1px solid var(--glass-border); color:var(--ink);
    background:var(--sheen), var(--glass-tint); backdrop-filter:blur(var(--blur)); -webkit-backdrop-filter:blur(var(--blur));
    font:650 14px 'Inter',system-ui; padding:11px 10px; border-radius:13px; cursor:pointer; text-decoration:none;
    display:flex; flex-direction:row; align-items:center; justify-content:center; gap:8px; transition:transform .15s;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.14)}
  .home-btn .hi{font-size:16px; line-height:1}
  .home-btn:active{transform:scale(.96)}
  .home-btn.on{color:#7cf5b8; background:var(--sheen), color-mix(in srgb,var(--on) 22%,var(--glass-tint)); border-color:color-mix(in srgb,var(--on) 45%,var(--glass-border))}
  .home-btn.off{color:#ff9aa4; background:var(--sheen), color-mix(in srgb,var(--off) 20%,var(--glass-tint)); border-color:color-mix(in srgb,var(--off) 45%,var(--glass-border))}
  .appbar [data-cfg]{display:none}
  /* ---------- body content (part of the normal page scroll now, see header comment above) ---------- */
  main{flex:0 0 auto; padding:18px 16px 34px; -webkit-overflow-scrolling:touch}
  .grpttl{font-size:17px; font-weight:700; color:var(--ink); margin:24px 4px 13px; letter-spacing:-.3px;
    display:flex; align-items:center; gap:10px}
  .grpttl:first-child{margin-top:4px}
  .grpttl .gcount{font-size:13px; font-weight:500; color:var(--ink-faint)}
  .grpttl .gtoggle{margin-left:auto; display:flex; gap:7px}
  .mini{appearance:none; border:1px solid var(--glass-border); color:var(--ink-2);
    background:var(--sheen), var(--glass-tint); backdrop-filter:blur(var(--blur)); -webkit-backdrop-filter:blur(var(--blur));
    font:600 13px 'Inter',system-ui; padding:6px 13px; border-radius:10px; cursor:pointer}
  .mini:active{transform:scale(.95)}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px}
  /* ---------- per-group global controls ---------- */
  .gctrl{display:flex; align-items:center; gap:14px; margin:0 4px 15px; flex-wrap:wrap}
  .gctrl input[type=range]{flex:1; min-width:130px; max-width:280px; height:7px}
  .gctrl .gswatches{display:flex; gap:9px}
  .gctrl .swatch{width:24px;height:24px}
  /* ---------- light card ---------- */
  .card{position:relative; border:1px solid var(--line); border-radius:var(--radius);
    background:var(--surface); padding:17px; overflow:hidden; box-shadow:var(--shadow-card);
    transition:border-color .3s, box-shadow .3s, transform .15s}
  .card.on{border-color:color-mix(in srgb,var(--cardc,#3a6df0) 55%, var(--line));
    box-shadow:0 10px 30px -12px color-mix(in srgb,var(--cardc,#3a6df0) 60%, transparent)}
  .card.offline{opacity:.55}
  .card .glow{position:absolute; inset:auto -30% -70% -30%; height:150px; filter:blur(50px);
    background:var(--cardc,#3a6df0); opacity:0; transition:opacity .3s; pointer-events:none}
  .card.on .glow{opacity:var(--glowop)}
  .crow{position:relative; display:flex; align-items:flex-start; gap:11px; z-index:1}
  .cname{font-weight:650; font-size:17px; line-height:1.2; letter-spacing:-.2px; color:var(--ink)}
  .csku{font-size:12.5px; color:var(--ink-faint); margin-top:3px}
  .dot{width:9px;height:9px;border-radius:50%; background:var(--ink-faint); margin-top:7px; flex:0 0 auto}
  .dot.online{background:var(--on); box-shadow:0 0 8px color-mix(in srgb,var(--on) 70%,transparent)}
  .dot.off2{background:var(--off); box-shadow:0 0 8px color-mix(in srgb,var(--off) 70%,transparent)}
  /* power switch */
  .pwr{margin-left:auto; flex:0 0 auto}
  .sw{width:54px;height:32px;border-radius:16px;border:1px solid var(--glass-border);
    background:var(--sheen), var(--glass-tint); backdrop-filter:blur(var(--blur)); -webkit-backdrop-filter:blur(var(--blur));
    position:relative; cursor:pointer; transition:.25s; box-shadow:inset 0 1px 3px rgba(0,0,0,.25)}
  .sw .knob{position:absolute; top:3px; left:3px; width:24px;height:24px;border-radius:50%;
    background:linear-gradient(160deg,#fff,#d8d5e8); transition:left .25s, background .25s; box-shadow:0 2px 5px rgba(0,0,0,.35)}
  .card.on .sw{background:color-mix(in srgb,var(--on) 22%,var(--surface)); border-color:color-mix(in srgb,var(--on) 55%,transparent)}
  .card.on .sw .knob{left:27px; background:var(--on)}
  .card.offline .sw{cursor:not-allowed}
  /* brightness */
  .ctl{position:relative; z-index:1; margin-top:16px}
  .lbl{display:flex; justify-content:space-between; font-size:13px; color:var(--ink-2);
    font-weight:500; margin-bottom:9px}
  .lbl span:last-child{color:var(--ink); font-weight:600}
  input[type=range]{width:100%; appearance:none; height:8px; border-radius:8px; cursor:pointer;
    background:linear-gradient(90deg,var(--cardc,#3a6df0) var(--p,60%),var(--line-strong) var(--p,60%))}
  input[type=range]::-webkit-slider-thumb{appearance:none; width:22px;height:22px;border-radius:50%;
    background:#fff; border:none; box-shadow:0 1px 5px rgba(0,0,0,.3), 0 0 0 2px color-mix(in srgb,var(--cardc,#3a6df0) 60%, transparent)}
  input[type=range]:disabled{opacity:.4}
  /* color row */
  .colors{display:flex; align-items:center; gap:11px; flex-wrap:wrap; margin-top:16px; position:relative; z-index:1}
  .swatch{width:28px;height:28px;border-radius:50%; border:2px solid var(--line-strong); cursor:pointer; transition:transform .15s}
  .swatch:active{transform:scale(.88)}
  .swatch.sel{border-color:var(--ink); box-shadow:0 0 0 3px color-mix(in srgb,var(--ink) 13%,transparent)}
  /* native color input styled as a round, directly-clickable swatch */
  input[type=color].picker{appearance:none; -webkit-appearance:none; padding:0; cursor:pointer;
    background:conic-gradient(#ff5e5e,#ffd166,#39d98a,#4f7cff,#b66bff,#ff5e5e)}
  input[type=color].picker::-webkit-color-swatch-wrapper{padding:0; border-radius:50%}
  input[type=color].picker::-webkit-color-swatch{border:none; border-radius:50%}
  input[type=color].picker::-moz-color-swatch{border:none; border-radius:50%}
  input[type=color].picker:disabled{opacity:.4; cursor:not-allowed}
  /* footer status */
  footer{flex:0 0 auto; padding:12px 18px calc(12px + env(safe-area-inset-bottom));
    border-top:1px solid var(--glass-border-soft); font-size:13px; color:var(--ink-2);
    display:flex; align-items:center; gap:10px;
    background:var(--sheen), color-mix(in srgb,var(--surface) 72%, transparent);
    backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px)}
  footer .live{display:flex;align-items:center;gap:7px}
  footer .pulse{width:8px;height:8px;border-radius:50%;background:var(--on);box-shadow:0 0 10px var(--on);
    animation:pls 2s ease-in-out infinite}
  @keyframes pls{0%,100%{opacity:1}50%{opacity:.35}}
  .badge{margin-left:auto; padding:4px 11px;border-radius:9px;
    background:color-mix(in srgb,#f5a623 18%,var(--glass-tint));color:#ffd166;
    font-weight:600;font-size:12px; border:1px solid color-mix(in srgb,#f5a623 40%,transparent)}
  /* impossible-to-miss demo-mode banner — a small footer badge alone kept
     confusing people into thinking sample data was their real lights */
  #demobanner{display:none; align-items:center; gap:12px; padding:13px 16px; margin:14px 16px 0;
    background:color-mix(in srgb,#f5a623 16%,var(--surface-2)); border:1px solid color-mix(in srgb,#f5a623 45%,transparent);
    border-radius:14px; color:#ffd166; font-size:13.5px}
  #demobanner b{color:#ffe6a8}
  #demobanner button{flex:0 0 auto; border:0; background:#f5a623; color:#241704; font-weight:700; font-size:13px;
    padding:9px 15px; border-radius:10px; cursor:pointer}
  .empty{color:var(--ink-2); text-align:center; padding:60px 20px; font-size:15px}
  /* ---------- bento dashboard ---------- */
  .summary{font-size:14px; color:var(--ink-2); font-weight:500; margin:2px 4px 16px}
  .bento{display:grid; grid-template-columns:1fr; gap:14px; grid-auto-flow:dense}
  @media (min-width:640px){ .bento{grid-template-columns:repeat(2,minmax(0,1fr))} .tile.wide{grid-column:span 2} }
  @media (min-width:1080px){ .bento{grid-template-columns:repeat(3,minmax(0,1fr))} }
  @media (min-width:1500px){ .bento{grid-template-columns:repeat(4,minmax(0,1fr))} .tile.wide{grid-column:span 2} }
  .tile{position:relative; display:flex; flex-direction:column; gap:13px; overflow:hidden;
    background:var(--sheen), var(--glass-tint); backdrop-filter:blur(var(--blur)) saturate(150%); -webkit-backdrop-filter:blur(var(--blur)) saturate(150%);
    border:1px solid var(--glass-border); border-radius:22px; padding:16px 17px;
    box-shadow:var(--shadow-card), inset 0 1px 0 rgba(255,255,255,.12)}
  .thead{display:flex; align-items:center; gap:11px}
  .tname{flex:1; font-size:16.5px; font-weight:700; letter-spacing:-.3px; color:var(--ink);
    display:flex; align-items:baseline; gap:9px; min-width:0}
  .tname .tcount{font-size:12.5px; font-weight:500; color:var(--ink-faint)}
  /* group master toggle */
  .gsw{width:52px;height:30px;border-radius:15px;border:1px solid var(--glass-border);
    background:var(--sheen), var(--glass-tint); backdrop-filter:blur(var(--blur)); -webkit-backdrop-filter:blur(var(--blur));
    position:relative; cursor:pointer; flex:0 0 auto; transition:.25s; box-shadow:inset 0 1px 3px rgba(0,0,0,.25)}
  .gsw .gk{position:absolute; top:3px; left:3px; width:22px;height:22px;border-radius:50%;
    background:linear-gradient(160deg,#fff,#d8d5e8); transition:left .25s, background .25s; box-shadow:0 2px 5px rgba(0,0,0,.35)}
  .gsw.on{background:color-mix(in srgb,var(--on) 24%,var(--surface)); border-color:color-mix(in srgb,var(--on) 55%,transparent)}
  .gsw.on .gk{left:25px; background:var(--on)}
  .tctrl{display:flex; align-items:center; gap:13px; flex-wrap:wrap}
  .tctrl input[type=range]{flex:1; min-width:120px; height:7px}
  .tswatch{display:flex; align-items:center; gap:9px; flex-wrap:wrap}
  .bicon{flex:0 0 auto; color:var(--ink-faint); font-size:15px; line-height:1}
  .ticon{flex:0 0 auto; color:var(--ink-faint); font-size:17px; text-decoration:none; padding:3px 6px; border-radius:5px}
  .ticon:hover{background:var(--surface-2); color:var(--ink)}
  /* light chips inside a tile */
  .lites{display:grid; grid-template-columns:1fr; gap:10px}
  @media (min-width:520px){ .tile.wide .lites{grid-template-columns:1fr 1fr} }
  .lite{position:relative; cursor:pointer;
    background:linear-gradient(160deg, rgba(255,255,255,.11) 0%, rgba(255,255,255,.02) 40%, rgba(255,255,255,0) 65%), rgba(255,255,255,.03);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:1px solid var(--glass-border-soft); border-radius:18px; padding:15px;
    display:flex; flex-direction:column; gap:6px; transition:border-color .3s, box-shadow .3s, background .3s;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}
  .lite:active{transform:scale(.985)}
  .lite.on{border-color:color-mix(in srgb,var(--litec,#8a7bff) 55%,var(--glass-border));
    background:radial-gradient(130% 120% at 28% 0%, color-mix(in srgb,var(--litec,#8a7bff) 26%, transparent), rgba(255,255,255,.04) 55%, transparent),
      linear-gradient(160deg, rgba(255,255,255,.10), rgba(255,255,255,0) 45%);
    box-shadow:0 10px 30px -10px color-mix(in srgb,var(--litec,#8a7bff) 65%, transparent), inset 0 1px 0 rgba(255,255,255,.14)}
  .lite.offline{opacity:.45; cursor:default}
  .literow{display:flex; align-items:center; gap:12px}
  .litedot{width:26px;height:26px;border-radius:9px;flex:0 0 auto;background:var(--litec,#888);
    box-shadow:0 0 18px color-mix(in srgb,var(--litec,#888) 85%,transparent)}
  .lite:not(.on) .litedot{box-shadow:none; opacity:.7}
  /* a running scene means the "color" isn't a fixed value — show a spinning
     rainbow ring instead of a flat swatch, so it never reads as a static color */
  .litedot.scenedot{background:conic-gradient(#ff5e5e,#ffd166,#39d98a,#4f7cff,#b66bff,#ff5e5e);
    animation:scenespin 3s linear infinite; box-shadow:0 0 18px rgba(180,150,255,.7)}
  @keyframes scenespin{to{transform:rotate(360deg)}}
  .litename{flex:1; min-width:0; font-size:15.5px; font-weight:650; color:var(--ink);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .litestatus{font-size:12.5px; color:var(--ink-2); font-weight:500}
  .literow2{display:flex; align-items:center; gap:11px}
  .literow2 input[type=range]{flex:1; height:6px}
  .lite .sw{width:46px;height:26px}
  .lite .sw .knob{width:20px;height:20px;top:2px;left:2px}
  .lite.on .sw{background:color-mix(in srgb,var(--on) 22%,var(--surface)); border-color:color-mix(in srgb,var(--on) 55%,transparent)}
  .lite.on .sw .knob{left:22px; background:var(--on)}
  .literow2 .picker{width:26px;height:26px;flex:0 0 auto}
  .litemain{display:flex; align-items:center; gap:10px; flex:1; min-width:0; background:none; border:0; padding:0; cursor:pointer; text-align:left; color:inherit; font:inherit}
  .litemore{margin-left:auto; color:var(--ink-faint); font-size:17px; padding-right:2px; line-height:1}
  /* ---------- light detail sheet ---------- */
  .sw.lon{background:color-mix(in srgb,var(--on) 22%,var(--surface)); border-color:color-mix(in srgb,var(--on) 55%,transparent)}
  .sw.lon .knob{left:27px; background:var(--on)}
  /* one continuous sheet: each control type is a plain row divided by a hairline,
     not a separate floating box — the panel is one thing, not a pile of things */
  .ld-card{border-top:1px solid var(--glass-border-soft); padding:16px 0; margin-top:0}
  .ld-card:first-of-type{border-top:0; padding-top:8px}
  .ld-hdr2{display:flex; align-items:center; gap:9px; font-size:12px; font-weight:700; letter-spacing:.5px;
    text-transform:uppercase; color:var(--ink-faint); margin-bottom:14px}
  .ld-hdr2 .ico{font-size:16px; line-height:1}
  .ld-val{margin-left:auto; font-size:14px; font-weight:700; color:var(--ink); text-transform:none; letter-spacing:0}
  .ld-sw.psel{border-color:var(--ink); box-shadow:0 0 0 3px color-mix(in srgb,var(--ink) 14%,transparent)}
  .ld-fill{border:1px solid var(--glass-border); background:var(--sheen), var(--glass-tint); color:var(--ink);
    font:600 12px 'Inter',system-ui; padding:6px 13px; border-radius:9px; cursor:pointer}
  .segstrip{display:flex; flex-wrap:wrap; gap:5px; margin-top:12px}
  .seg-cell{width:26px; height:36px; border-radius:5px; border:1px solid var(--glass-border-soft); cursor:pointer; padding:0; transition:transform .1s;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.18)}
  .seg-cell:active{transform:scale(.9)}
  .ld-actions{display:flex; gap:9px}
  .ld-act{flex:1; border:1px solid var(--glass-border); background:var(--sheen), var(--glass-tint); color:var(--ink);
    font:650 14px 'Inter',system-ui; padding:12px; border-radius:12px; cursor:pointer; box-shadow:inset 0 1px 0 rgba(255,255,255,.12);
    text-decoration:none; display:flex; align-items:center; justify-content:center; gap:6px; text-align:center}
  /* Govee-app-style mode tab bar (Color/Scene/Effects/Music) — rounded-square
     icon buttons, active one filled with the cyan accent, matching the real
     Govee app's Music/Color/Scene/DIY switcher. */
  .ldm-tabs{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:14px 0 16px}
  .ldm-tab{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px;
    padding:12px 4px; border-radius:14px; border:1px solid var(--glass-border-soft); cursor:pointer;
    background:var(--surface-2); color:var(--ink-2); font:650 12px 'Inter',system-ui; transition:transform .12s}
  .ldm-tab .ico2{font-size:19px; line-height:1}
  .ldm-tab:active{transform:scale(.95)}
  .ldm-tab.active{background:linear-gradient(160deg,var(--gv-cyan),var(--gv-cyan-2)); color:#052730;
    box-shadow:0 8px 20px -8px rgba(41,195,240,.6), inset 0 1px 0 rgba(255,255,255,.35)}
  .ld-act:active{transform:scale(.96)}
  .ld-act:disabled{opacity:.4; cursor:not-allowed}
  .ld-dim{color:var(--ink-faint); font-size:13px; margin-top:8px}

  /* toast */

<body>

  <footer>
    <span class="live"><span class="pulse"></span><span id="status">Connecting…</span></span>
    <span id="updated"></span>
    <span class="badge" id="modebadge">MOCK DATA</span>
  </footer>

  <div id="toast"></div>

<script>
/* ============================================================
   CONFIG  — flip USE_MOCK to false once the Railway proxy is up.
   The proxy holds the Govee-API-Key; the browser never sees it.
   ============================================================ */
const CONFIG = (() => {
  // Connection details live in localStorage (set via the ⚙ Settings dialog),
  // so going live needs no code edit and no secret committed to the repo.
  // Mock mode stays on until a proxy URL is saved.
  let s = {}; try { s = JSON.parse(localStorage.getItem("gv_cfg") || "{}"); } catch {}
  const sameOrigin = location.protocol.startsWith("http") ? location.origin : "";
  const PROXY_BASE = (s.proxyBase || sameOrigin).replace(/\/+$/, "");
  return {
    USE_MOCK: !(s.live || s.proxyBase),   // demo until the user saves real settings
    PROXY_BASE,
    PASSCODE: s.passcode || "",
    POLL_MS: 45000,            // state auto-refresh interval
  };
})();

/* ============================================================
   API LAYER  — same method names whether mock or live.
   Mock data is shaped exactly like Govee Cloud API v2 responses,
   so going live is just CONFIG.USE_MOCK = false.
   ============================================================ */
const Govee = (() => {
  // ---- helpers shared by both backends ----
  const rgbToInt = (r,g,b) => (r<<16)|(g<<8)|b;
  const intToRgb = n => ({ r:(n>>16)&255, g:(n>>8)&255, b:n&255 });

  // ---------- MOCK backend ----------
  const mockDevices = [
    dev("Living Room Lamp","H6008","Living Room", true, true, 70, [255,180,90]),
    dev("TV Backlight","H6199","Living Room", true, true, 100, [80,120,255], 15),
    dev("Kitchen Strip","H6125","Kitchen", true, false, 55, [255,255,255], 10),
    dev("Bedroom Bulb","H6009","Bedroom", true, true, 30, [255,120,160]),
    dev("Backyard Flood","H7060","Backyard", true, false, 90, [120,255,160], 12),
    dev("Garage Strip","H619A","Backyard", false, false, 60, [255,255,255]), // offline
  ];
  function dev(name,sku,room,online,on,bri,rgb,segs){
    const caps=[
      {type:"devices.capabilities.on_off",instance:"powerSwitch"},
      {type:"devices.capabilities.range",instance:"brightness",parameters:{range:{min:1,max:100}}},
      {type:"devices.capabilities.color_setting",instance:"colorRgb"},
    ];
    if(segs) caps.push({type:"devices.capabilities.segment_color_setting",instance:"segmentedColorRgb",
      parameters:{fields:[{fieldName:"segment",size:{min:1,max:segs},elementRange:{min:0,max:segs-1}},{fieldName:"rgb"}]}});
    return { sku, device:"MOCK:"+name.replace(/\W+/g,""), deviceName:name, room,
      type:"devices.types.light", online,
      _state:{ on, brightness:bri, color:rgbToInt(...rgb) },
      capabilities:caps};
  }
  const wait = ms => new Promise(r=>setTimeout(r,ms));

  async function mockList(){
    await wait(350);
    return mockDevices.map(d => ({ ...d }));
  }
  async function mockState(deviceId){
    await wait(120);
    const d = mockDevices.find(x=>x.device===deviceId);
    return d ? { online:d.online, ...d._state } : null;
  }
  async function mockControl(deviceId, capability, instance, value){
    await wait(180);
    const d = mockDevices.find(x=>x.device===deviceId);
    if(!d) throw new Error("device not found");
    if(!d.online) throw new Error("device offline");
    if(instance==="powerSwitch") d._state.on = !!value;
    if(instance==="brightness")  d._state.brightness = value;
    if(instance==="colorRgb")    d._state.color = value;
    if(instance==="colorTemperatureK"){ d._state.colorTemp = value; d._state.color = kelvinToRgb(value); }
    // segment colors are tracked in the UI (_segColors); mock just accepts the command
    return { ok:true };
  }
  async function mockFlash(){ await wait(150); return { ok:true }; }

  // ---------- LIVE backend (Railway proxy) ----------
  async function call(path, body){
    const res = await fetch(CONFIG.PROXY_BASE + path, {
      method: body ? "POST":"GET",
      headers: { "Content-Type":"application/json", "X-Passcode": CONFIG.PASSCODE },
      body: body ? JSON.stringify(body) : undefined,
    });
    if(!res.ok) throw new Error("proxy "+res.status);
    return res.json();
  }
  async function liveList(){ return (await call("/govee/devices")).data; }
  async function liveState(deviceId){ return (await call("/govee/state",{device:deviceId})).data; }
  async function liveControl(deviceId, capability, instance, value){
    return call("/govee/control",{ device:deviceId, capability, instance, value });
  }

  // ---------- public ----------
  const M = CONFIG.USE_MOCK;
  return {
    rgbToInt, intToRgb,
    list:    M ? mockList    : liveList,
    state:   M ? mockState   : liveState,
    setPower:(id,on)   => (M?mockControl:liveControl)(id,"devices.capabilities.on_off","powerSwitch",on?1:0),
    setBright:(id,v)   => (M?mockControl:liveControl)(id,"devices.capabilities.range","brightness",v),
    setColor:(id,rgbInt)=>(M?mockControl:liveControl)(id,"devices.capabilities.color_setting","colorRgb",rgbInt),
    setColorTemp:(id,k) =>(M?mockControl:liveControl)(id,"devices.capabilities.color_setting","colorTemperatureK",k),
    setSegmentColor:(id,segs,rgbInt)=>(M?mockControl:liveControl)(id,"devices.capabilities.segment_color_setting","segmentedColorRgb",{segment:segs,rgb:rgbInt}),
    flash:(id,cols,times)=> M ? mockFlash() : call("/govee/flash",{device:id,cols,times}),
    listScenes: async (id)=> M
      ? ["Sunrise","Aurora","Rainbow","Sunset","Forest","Ocean","Candlelight","Party","Fire","Night","Nebula","Spring"].map((n,i)=>({name:n,value:{id:i},instance:"lightScene"}))
      : ((await call("/govee/scenes",{device:id})).data || []),
    applyBuiltin:(id,value,instance)=> M ? mockFlash() : call("/govee/scene/builtin",{device:id,value,instance}),
  };
})();

/* ============================================================
   GROUPS API — server-synced (so groups follow you to every device).
   Mock mode keeps them in localStorage.
   ============================================================ */
const GroupsAPI = (() => {
  const M = CONFIG.USE_MOCK, KEY = "gv_groups";
  const lget = () => { try { return JSON.parse(localStorage.getItem(KEY) || "[]"); } catch { return []; } };
  const lset = v => localStorage.setItem(KEY, JSON.stringify(v));
  const call = async (path, method, body) => {
    const r = await fetch(CONFIG.PROXY_BASE + path, {
      method, headers: { "Content-Type": "application/json", "X-Passcode": CONFIG.PASSCODE },
      body: body ? JSON.stringify(body) : undefined });
    if (!r.ok) throw new Error("groups " + r.status);
    return r.json();
  };
  return {
    list:   async () => M ? lget() : ((await call("/groups", "GET")).data || []),
    add:    async name => { if (M) { const a = lget(); const g = { id: "g" + Date.now(), name, devices: [] }; a.push(g); lset(a); return g; }
                            return (await call("/groups", "POST", { name, devices: [] })).data; },
    update: async (id, patch) => { if (M) { const a = lget(); const g = a.find(x => x.id === id); if (g) Object.assign(g, patch); lset(a); return g; }
                                   return (await call("/groups/" + id, "PATCH", patch)).data; },
    remove: async id => { if (M) { lset(lget().filter(x => x.id !== id)); return; } await call("/groups/" + id, "DELETE"); },
  };
})();
let GROUPS = [];

/* ============================================================
   UI
   ============================================================ */
const PRESETS = [ // name + rgb
  ["#ffffff",255,255,255],["#ffb347",255,179,71],["#ff5e5e",255,94,94],
  ["#39d98a",57,217,138],["#4f7cff",79,124,255],["#b66bff",182,107,255],
];
let DEVICES = [];
const app = document.getElementById("app");
const $ = s => document.querySelector(s);

function cssRgb(n){ const {r,g,b}=Govee.intToRgb(n); return `rgb(${r},${g},${b})`; }
function toast(msg, isErr){
  const t=$("#toast"); t.textContent=msg; t.className = "show"+(isErr?" err":"");
  clearTimeout(t._h); t._h=setTimeout(()=>t.className="",1900);
}
function fmtTime(d){ return d.toLocaleTimeString([], {hour:"numeric",minute:"2-digit"}); }
function flashEl(el){ if(!el)return; el.classList.remove("tapped"); void el.offsetWidth; el.classList.add("tapped"); setTimeout(()=>el.classList.remove("tapped"),470); }

function render(){
  if(!DEVICES.length){ app.innerHTML='<div class="empty">No lights found.</div>'; return; }
  // bucket by group; order: defined groups first, Ungrouped last
  const byGroup = {};
  DEVICES.forEach(d => (byGroup[d.room||"Ungrouped"] ||= []).push(d));
  const ordered = [
    ...GROUPS.map(g=>g.name).filter(n=>byGroup[n]),
    ...Object.keys(byGroup).filter(n=>n!=="Ungrouped" && !GROUPS.some(g=>g.name===n)),
  ];
  if(byGroup["Ungrouped"]) ordered.push("Ungrouped");

  const totalOn = DEVICES.filter(d=>d._state.on && d.online).length;
  const totalOnline = DEVICES.filter(d=>d.online).length;
  const seen = new Set();
  let tiles = "";
  for(const name of ordered){
    if(seen.has(name)) continue; seen.add(name);
    const list = byGroup[name]; if(!list) continue;
    const online = list.filter(d=>d.online);
    const onCount = online.filter(d=>d._state.on).length;
    const anyOn = onCount>0;
    const avg = online.length ? Math.round(online.reduce((s,d)=>s+d._state.brightness,0)/online.length) : 60;
    const wide = list.length>=3;
    const presets = PRESETS.map(([hex,r,g,b])=>
      `<span class="swatch" style="background:${hex}" data-grpcolor="${Govee.rgbToInt(r,g,b)}" data-grp="${name}"></span>`).join("");
    const gid = (GROUPS.find(g=>g.name===name)||{}).id;
    const sceneLink = gid ? `<a class="ticon" href="scenes.html#scenetgt=grp:${gid}" title="Scenes for ${name} — applies straight to this group, no picker">🎬</a>` : "";
    const timerLink = gid ? `<a class="ticon" href="scenes.html#tgt=grp:${gid}" title="Set a timer for ${name}">⏱</a>` : "";
    tiles += `<div class="tile ${wide?'wide':''}">
        <div class="thead">
          <span class="tname">${name} <span class="tcount">${onCount}/${list.length} on</span></span>
          ${sceneLink}
          ${timerLink}
          <div class="gsw ${anyOn?'on':''}" data-grptoggle="${name}" role="switch" aria-checked="${anyOn}"><span class="gk"></span></div>
        </div>
        <div class="tctrl">
          <span class="bicon" title="Brightness">☀</span>
          <input type="range" min="1" max="100" value="${avg}" data-grpbri="${name}" style="--p:${avg}%">
          <span class="tswatch">${presets}<input type="color" class="swatch picker" data-grppick="${name}" value="#ffffff" title="Custom color for ${name}"></span>
        </div>
        <div class="lites">${list.map(liteHTML).join("")}</div>
      </div>`;
  }
  app.innerHTML =
    `<div class="summary">${totalOn} of ${totalOnline} lights on · ${ordered.length} ${ordered.length===1?'group':'groups'}</div>`
    + `<div class="bento">${tiles}</div>`;
}

// compact light "chip": colored dot + name + toggle, with brightness + custom color
function liteHTML(d){
  const scene = ActiveScene.get(d.device);
  const c = cssRgb(d._state.color);
  const on = d._state.on && d.online;
  const bri = d._state.brightness;
  const status = !d.online ? "Offline" : scene ? `🎬 ${scene.name}` : (on ? `On · ${bri}%` : "Off");
  const dotCls = scene && on ? "litedot scenedot" : "litedot";
  return `<div class="lite ${on?'on':''} ${d.online?'':'offline'}" style="--litec:${c}" data-litedetail="${d.device}" title="Tap for full controls">
    <div class="literow">
      <span class="${dotCls}"></span>
      <span class="litename">${d.deviceName}</span>
      <div class="sw" data-pwr="${d.device}" role="switch" aria-checked="${on}"><span class="knob"></span></div>
    </div>
    <div class="litestatus">${status}</div>
  </div>`;
}
function rgbHex(n){ const {r,g,b}=Govee.intToRgb(n);
  return "#"+[r,g,b].map(x=>x.toString(16).padStart(2,"0")).join(""); }
function hexInt(hex){ const n=parseInt(hex.slice(1),16); return n; }
// full-saturation color from a hue angle (0-360)
function hueToRgb(h){ h=((h%360)+360)%360; const x=1-Math.abs((h/60)%2-1); let r,g,b;
  if(h<60){r=1;g=x;b=0;} else if(h<120){r=x;g=1;b=0;} else if(h<180){r=0;g=1;b=x;}
  else if(h<240){r=0;g=x;b=1;} else if(h<300){r=x;g=0;b=1;} else {r=1;g=0;b=x;}
  return (Math.round(r*255)<<16)|(Math.round(g*255)<<8)|Math.round(b*255); }
function rgbToHue(n){ const {r,g,b}=Govee.intToRgb(n); const R=r/255,G=g/255,B=b/255;
  const mx=Math.max(R,G,B),mn=Math.min(R,G,B),d=mx-mn; let h=0;
  if(d===0)h=0; else if(mx===R)h=((G-B)/d)%6; else if(mx===G)h=(B-R)/d+2; else h=(R-G)/d+4;
  h=Math.round(h*60); return h<0?h+360:h; }
// approximate RGB for a white color temperature in Kelvin (~2000-9000)
function kelvinToRgb(k){ const t=k/100; let r,g,b;
  r = t<=66 ? 255 : 329.7*Math.pow(t-60,-0.1332);
  g = t<=66 ? 99.47*Math.log(t)-161.12 : 288.12*Math.pow(t-60,-0.0755);
  b = t>=66 ? 255 : (t<=19 ? 0 : 138.52*Math.log(t-10)-305.04);
  const cl=x=>Math.max(0,Math.min(255,Math.round(x||0)));
  return (cl(r)<<16)|(cl(g)<<8)|cl(b); }

/* ---------- interactions (event delegation) ---------- */
async function safe(fn, optimistic){
  try{ optimistic && optimistic(); await fn(); }
  catch(e){ toast(e.message||"Failed", true); load(); /* resync truth */ }
}
app.addEventListener("click", e=>{
  const pwr = e.target.closest("[data-pwr]");
  if(pwr){ const d = byId(pwr.dataset.pwr); if(!d.online) return toast("Light is offline",true);
    const next = !d._state.on;
    return safe(()=>Govee.setPower(d.device,next), ()=>{ d._state.on=next; touch(d); render(); });
  }
  const ld = e.target.closest("[data-litedetail]");
  if(ld){ return openLight(ld.dataset.litedetail); }
  const sw = e.target.closest("[data-color]");
  if(sw){ const d = byId(sw.dataset.dev); const v = +sw.dataset.color;
    stopSceneFor([d.device]);
    return safe(()=>setColorEverywhere(d,v), ()=>{ d._state.color=v; touch(d); render(); });
  }
  const gtog = e.target.closest("[data-grptoggle]");
  if(gtog){ const name=gtog.dataset.grptoggle; const online=DEVICES.filter(d=>d.room===name && d.online);
    const want = !online.some(d=>d._state.on);   // any on -> turn all off, else all on

/* ============================================================
   ACTIVE SCENE TRACKING — the Scenes page writes here whenever it starts
   a scene/animation on a device (localStorage, shared across both pages
   since they're same-origin). Lets the dashboard + detail panel show
   "running a scene" honestly instead of a stale/misleading static color,
   and lets a manual brightness/color/temp change actually stop the
   animation instead of being silently overwritten by the next tick.
   ============================================================ */
const ActiveScene = {
  all(){ try{ return JSON.parse(localStorage.getItem("gv_active_scene")||"{}"); }catch{ return {}; } },
  get(id){ return this.all()[id]; },
  clearMany(ids){ const a=this.all(); let ch=false; ids.forEach(id=>{ if(a[id]){ delete a[id]; ch=true; } });
    if(ch) localStorage.setItem("gv_active_scene", JSON.stringify(a)); },
  mark(id,name,pattern){ const a=this.all(); a[id]={name,pattern,ts:Date.now()}; localStorage.setItem("gv_active_scene", JSON.stringify(a)); },
};
const SEG_PATTERNS = ["chase","wave","strobe","bounce","twinkle"];
async function stopSceneFor(ids){
  const recs = ids.map(id=>({id, rec:ActiveScene.get(id)})).filter(x=>x.rec);
  if(!recs.length) return;
  ActiveScene.clearMany(ids);
  if(CONFIG.USE_MOCK) return;
  const segIds = recs.filter(x=>SEG_PATTERNS.includes(x.rec.pattern)).map(x=>x.id);
  const otherIds = recs.filter(x=>!SEG_PATTERNS.includes(x.rec.pattern)).map(x=>x.id);
  const tasks=[];
  if(segIds.length) tasks.push(fetch(CONFIG.PROXY_BASE+"/govee/segscene/stop",{method:"POST",
    headers:{"Content-Type":"application/json","X-Passcode":CONFIG.PASSCODE},body:JSON.stringify({devices:segIds})}));
  if(otherIds.length) tasks.push(fetch(CONFIG.PROXY_BASE+"/govee/stop",{method:"POST",
    headers:{"Content-Type":"application/json","X-Passcode":CONFIG.PASSCODE},body:JSON.stringify({devices:otherIds})}));
  await Promise.allSettled(tasks);
}

async function load(){
  try{
    $("#status").textContent = "Refreshing…";
    // remember anything the user just changed, so a slow cloud read can't snap it back
    const recent = {}; DEVICES.forEach(d=>{ if(d._touched) recent[d.device]={touched:d._touched, state:d._state}; });
    DEVICES = await Govee.list();
    // mock list already carries _state; live list will need a state fetch per device:
    if(!CONFIG.USE_MOCK){
      await Promise.all(DEVICES.map(async d=>{
        try{ const s=await Govee.state(d.device);
          d.online = s?.online ?? true;
          d._state = { on:!!s.on, brightness:s.brightness??100, color:s.color??Govee.rgbToInt(255,255,255) };
        }catch{ d.online=false; d._state={on:false,brightness:100,color:Govee.rgbToInt(255,255,255)}; }
        const p = recent[d.device];   // keep a change made in the last 15s
        if(p && (Date.now()-p.touched) < 15000 && p.state){ d._state = p.state; d._touched = p.touched; }
      }));
    }
    // assign each device to its group (server-synced); ungrouped fall to "Ungrouped"
    try{ GROUPS = await GroupsAPI.list(); }catch{ GROUPS = []; }
    const gmap = {}; GROUPS.forEach(g=>(g.devices||[]).forEach(id=>gmap[id]=g.name));
    DEVICES.forEach(d=>{ d.room = gmap[d.device] || d.room || "Ungrouped"; });
    render(); renderSnaps();
    const n = DEVICES.length, online = DEVICES.filter(d=>d.online).length;
    $("#status").textContent = `${online}/${n} online`;
    $("#updated").textContent = "· updated "+fmtTime(new Date());
  }catch(e){
    app.innerHTML = `<div class="empty">Couldn't reach the lights.<br><small>${e.message}</small></div>`;
    $("#status").textContent = "Offline";
  }
}

const THEME_PALETTES = [
  [["firework","fire","flame","ember","lava"], ["#ff3b00","#ff8c00","#ffd000","#ff2d00"]],
  [["valentine","love","heart","romantic","romance"], ["#ff2d6a","#ff7aa8","#ffd0e0","#d4537e"]],

  [["forest","spring","refresh","nature","leaf","green","meadow","jungle"], ["#0f6e2e","#39a845","#8bd450","#1d9e75"]],
  [["deep sea","undersea","ocean","sea","aqua","water","lake","marine","dive"], ["#062a4a","#0b4f9e","#1d9e75","#0a1e5e"]],
  [["aurora","nebula","galaxy","star","universe","cosmic","milky","meteor"], ["#5e2ea8","#2e6be6","#00c7be","#af52de"]],
  [["sunrise","morning","dawn"], ["#ff9d5c","#ffd08a","#ffe9b0","#8ec9ff"]],
  [["sunset","dusk","afternoon","twilight","evening"], ["#ff5e62","#ff9966","#ffcf87","#9b5de5"]],
  [["snow","winter","ice","frost","cold"], ["#bfe6ff","#7fbfff","#ffffff","#5e8bff"]],
  [["night","midnight","dark","sleep","moon"], ["#0a1e5e","#123a7a","#1d9e75","#062038"]],
  [["white","bright","daylight","clean"], ["#e8f0ff","#cfe0ff","#ffffff","#dfe8ff"]],
  [["rainbow","spectrum","gradient","flow","spin","swing","fluctuat","stack"], ["#ff3b30","#ff9500","#ffd60a","#34c759","#0a84ff","#bf5af2"]],

function hashHue(str){ let h=0; for(let i=0;i<str.length;i++) h=(h*31+str.charCodeAt(i))>>>0; return h%360; }
function paletteFromName(name){
  const n=(name||"").toLowerCase();
  for(const [keys,pal] of THEME_PALETTES){ if(keys.some(k=>n.includes(k))) return pal; }
  const b=hashHue(n); return [0,70,150,230].map(o=>`hsl(${(b+o)%360} 78% 56%)`);
}
// The device's built-in scene list can be huge (factory catalog + every DIY
// scene ever created in the Govee app) — search + sort so it's actually
// browsable, instead of one giant unsorted flex-wrap of plain-text chips
// (jford screenshotted a light with 60+ scenes: "way too long a scrolling
// list with no visible representation").
// Photo-to-palette (our version of Govee's "Effects Lab" photo color gallery
// — we don't have their curated photo library, so instead: pick any photo,
// pull its dominant colors straight off the pixels, apply as a scene).
// Downscales to a small canvas and buckets pixels into coarse RGB cells so a
// handful of DOMINANT colors fall out, rather than every unique pixel value.
function extractPalette(img, n){
  const W=48, H=48;
  const c=document.createElement("canvas"); c.width=W; c.height=H;
  const ctx=c.getContext("2d"); ctx.drawImage(img,0,0,W,H);
  const data=ctx.getImageData(0,0,W,H).data;
  const buckets={};
  for(let i=0;i<data.length;i+=4){
    if(data[i+3]<128) continue;   // skip transparent pixels
    const r=data[i], g=data[i+1], b=data[i+2];
    const key=Math.round(r/32)+","+Math.round(g/32)+","+Math.round(b/32);
    const bk=buckets[key] ||= {r:0,g:0,b:0,n:0};
    bk.r+=r; bk.g+=g; bk.b+=b; bk.n++;
  }
  return Object.values(buckets).sort((a,b)=>b.n-a.n).slice(0,n)
    .map(v=>[Math.round(v.r/v.n), Math.round(v.g/v.n), Math.round(v.b/v.n)]);
}

// does this device expose addressable segments? (RGBIC strips) + how many
function segInfo(d){
  const cap=(d.capabilities||[]).find(c=>c.type==="devices.capabilities.segment_color_setting");
  if(!cap) return {supported:false,count:0};
  let count=0;
  try{ const f=(cap.parameters?.fields||[]).find(x=>/segment/i.test(x.fieldName||""));
    count=(f?.size?.max) || (f?.elementRange?.max!=null ? f.elementRange.max+1 : 0); }catch{}
  return {supported:true, count: count||15};
}
// Setting "the whole light" to a color only touches the whole-device colorRgb
// capability. On an RGBIC/segment strip, any earlier segment-painting or
// chase/wave/bounce scene leaves individual SEGMENTS in different colors that
// this does NOT clear — so "one solid color" can silently stay non-uniform.
// This pushes the color across every segment too, so a segment-capable strip
// actually goes uniform instead of just updating a capability Govee may not
// use to override existing per-segment state.
function setColorEverywhere(d, v){
  const p = Govee.setColor(d.device, v);
  const seg = segInfo(d);
  if(seg.supported){
    const all = Array.from({length:seg.count}, (_,i)=>i);
    d._segColors = all.map(()=>v);
    return Promise.allSettled([p, Govee.setSegmentColor(d.device, all, v)]);
  }
  return p;
}
// Raw diagnostics: what Govee's API actually reports for this device — so

    : "no rate-limit headers seen yet this session — trigger any scene/control, then reopen this panel";

    ["Capabilities", caps],

    ["Govee API quota", rlText],

}

function attachWhole(card,d){
  const q=s=>card.querySelector(s);
  const bel=q("[data-ldbri]"); bel.oninput=()=>{ const v=+bel.value; if(!d._ldb) stopSceneFor([d.device]); d._state.brightness=v; touch(d); bel.style.setProperty("--p",v+"%"); q("[data-ldbrival]").textContent=v+"%"; clearTimeout(d._ldb); d._ldb=setTimeout(()=>{ d._ldb=null; Govee.setBright(d.device,v).catch(()=>{}); },220); };
  const hel=q("[data-ldhue]"); hel.oninput=()=>{ if(!d._ldh) stopSceneFor([d.device]); const v=hueToRgb(+hel.value); d._state.color=v; d._state.colorTemp=0; touch(d); clearTimeout(d._ldh); d._ldh=setTimeout(()=>{ d._ldh=null; setColorEverywhere(d,v).catch(()=>{}); render(); },180); };
  const pel=q("[data-ldpick]"); pel.oninput=()=>{ if(!d._ldp) stopSceneFor([d.device]); const v=hexInt(pel.value); d._state.color=v; d._state.colorTemp=0; touch(d); clearTimeout(d._ldp); d._ldp=setTimeout(()=>{ d._ldp=null; setColorEverywhere(d,v).catch(()=>{}); render(); renderLightDetail(); },180); };
  const tel=q("[data-ldtemp]"); tel.oninput=()=>{ if(!d._ldt) stopSceneFor([d.device]); const v=+tel.value; d._state.colorTemp=v; d._state.color=kelvinToRgb(v); touch(d); q("[data-ldtempval]").textContent=v+"K"; clearTimeout(d._ldt); d._ldt=setTimeout(()=>{ d._ldt=null; Govee.setColorTemp(d.device,v).catch(()=>{}); render(); },220); };
  card.querySelectorAll("[data-ldcol]").forEach(b=>b.onclick=()=>{ stopSceneFor([d.device]); const v=+b.dataset.ldcol; d._state.color=v; d._state.colorTemp=0; touch(d); setColorEverywhere(d,v).catch(()=>{}); toast("Color set"); render(); renderLightDetail(); });
  card.querySelectorAll("[data-ldwhite]").forEach(b=>b.onclick=()=>{ stopSceneFor([d.device]); const v=+b.dataset.ldwhite; d._state.colorTemp=v; d._state.color=kelvinToRgb(v); touch(d); Govee.setColorTemp(d.device,v).catch(()=>{}); toast(v+"K white"); render(); renderLightDetail(); });
  const fb=q("[data-ldflash]"); if(fb) fb.onclick=()=>{ if(!d.online) return; const {r,g,b}=Govee.intToRgb(d._state.color); Govee.flash(d.device,[[r,g,b]],3).catch(()=>{}); toast("Flashing "+d.deviceName); };
  const rb=q("[data-ldrandom]"); if(rb) rb.onclick=()=>{ if(!d.online) return; stopSceneFor([d.device]); const v=Math.floor(Math.random()*0x1000000); d._state.color=v; d._state.colorTemp=0; touch(d); setColorEverywhere(d,v).catch(()=>{}); render(); renderLightDetail(); };
}
// Subsection: paint individual segments of an RGBIC strip
function subBody(d,seg){
  if(!Array.isArray(d._segColors) || d._segColors.length!==seg.count)
    d._segColors = Array.from({length:seg.count}, (_,i)=> (d._segColors&&d._segColors[i]) ?? d._state.color);
  const paint = +(document.getElementById("liteOverlay").dataset.paint || d._state.color);
  const sw = MORECOLORS.map(hex=>{ const v=hexInt(hex); return `<button class="ld-sw ${v===paint?'psel':''}" data-ldpaint="${v}" style="background:${hex}"></button>`; }).join("");
  const cells = d._segColors.map((c,i)=>`<button class="seg-cell" data-seg="${i}" style="background:${cssRgb(c)}" title="Segment ${i+1}"></button>`).join("");
  return `
    <div class="ld-lbl" style="margin-top:2px"><span>Paint color — then tap a segment</span></div>
    <div class="ld-sws">${sw}<input type="color" class="swatch picker" value="${rgbHex(paint)}" data-ldpaintpick title="Custom paint color"></div>
    <div class="ld-lbl" style="margin-top:16px"><span>${seg.count} segments</span><button class="ld-fill" data-segfill>Fill all</button></div>
    <div class="segstrip">${cells}</div>`;
}
function attachSub(card,d,seg){
  const ov=document.getElementById("liteOverlay");
  const paint=()=>+(ov.dataset.paint || d._state.color);
  card.querySelectorAll("[data-ldpaint]").forEach(b=>b.onclick=()=>{ ov.dataset.paint=b.dataset.ldpaint; renderLightDetail(); });
  const pp=card.querySelector("[data-ldpaintpick]"); if(pp) pp.oninput=()=>{ ov.dataset.paint=String(hexInt(pp.value)); renderLightDetail(); };
  // tap OR drag across segments to paint; whole stroke sends one API call
  const strip=card.querySelector(".segstrip");
  if(strip){
    strip.style.touchAction="none";
    let painting=false; const dragged=new Set();
    const mark=(x,y)=>{ const el=document.elementFromPoint(x,y); const cell=el&&el.closest&&el.closest("[data-seg]");
      if(!cell || !strip.contains(cell)) return; const i=+cell.dataset.seg, v=paint();
      if(d._segColors[i]!==v){ d._segColors[i]=v; cell.style.background=cssRgb(v); } dragged.add(i); };
    strip.addEventListener("pointerdown", e=>{ if(!d.online) return toast("Light is offline",true);
      painting=true; dragged.clear(); try{ strip.setPointerCapture(e.pointerId); }catch{} mark(e.clientX,e.clientY); });
    strip.addEventListener("pointermove", e=>{ if(painting) mark(e.clientX,e.clientY); });
    const commit=()=>{ if(!painting) return; painting=false;
      if(dragged.size && d.online) Govee.setSegmentColor(d.device,[...dragged],paint()).catch(()=>{}); dragged.clear(); };
    strip.addEventListener("pointerup", commit);
    strip.addEventListener("pointercancel", commit);
  }
  const fill=card.querySelector("[data-segfill]"); if(fill) fill.onclick=()=>{ if(!d.online) return toast("Light is offline",true);
    const v=paint(); d._state.color=v; d._state.colorTemp=0; touch(d);
    d._segColors=d._segColors.map(()=>v);
    Govee.setSegmentColor(d.device, d._segColors.map((_,i)=>i), v).catch(()=>{});
    Govee.setColor(d.device,v).catch(()=>{});   // keep the whole-device color capability in sync too
    render(); renderLightDetail(); };
}

/* ============================================================
   GROUPS MANAGER  — create groups, assign lights (exclusive membership).
   Changes save to the proxy and re-render the dashboard.
   ============================================================ */
function openGroups(){
  let ov = document.getElementById("grpOverlay");
  if(!ov){
    ov = document.createElement("div"); ov.id = "grpOverlay";
    ov.style.cssText = "position:fixed;inset:0;z-index:150;display:none;align-items:center;justify-content:center;background:rgba(4,6,18,.62);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:18px";
    ov.innerHTML = '<div id="grpCard" style="width:min(460px,94vw);max-height:84vh;overflow:auto;box-sizing:border-box;'
      +'background:linear-gradient(160deg, rgba(255,255,255,.10), rgba(255,255,255,0) 35%), rgba(21,19,31,.82);'
      +'backdrop-filter:blur(30px) saturate(160%);-webkit-backdrop-filter:blur(30px) saturate(160%);'
      +'border:1px solid rgba(255,255,255,.15);border-radius:22px;padding:20px;color:#fff;'
      +'box-shadow:0 24px 70px -20px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.13)"></div>';
    document.body.appendChild(ov);
    ov.addEventListener("click", e=>{ if(e.target===ov) ov.style.display="none"; });
    // delegated actions inside the modal
    ov.addEventListener("change", async e=>{
      const as = e.target.closest("[data-gassign]");
      if(as){ const dev=as.dataset.gassign, gid=as.value;
        // exclusive: drop the light from any group it's in, then add to the chosen one
        for(const g of GROUPS){ if((g.devices||[]).includes(dev)){ const nd=g.devices.filter(x=>x!==dev); await GroupsAPI.update(g.id,{devices:nd}); g.devices=nd; } }
        if(gid){ const g=GROUPS.find(x=>x.id===gid); if(g){ const nd=(g.devices||[]).concat(dev); await GroupsAPI.update(gid,{devices:nd}); g.devices=nd; } }
        renderGroupsModal(); load(); return;
      }
      const rn = e.target.closest("[data-grename]");
      if(rn){ await GroupsAPI.update(rn.dataset.grename,{name:rn.value.trim()||"Group"}); GROUPS=await GroupsAPI.list(); renderGroupsModal(); load(); return; }
    });
    ov.addEventListener("click", async e=>{
      const del = e.target.closest("[data-grdel]");
      if(del){ await GroupsAPI.remove(del.dataset.grdel); GROUPS=await GroupsAPI.list(); renderGroupsModal(); load(); return; }
    });
  }
  ov.style.display = "flex";
  renderGroupsModal();
}
async function renderGroupsModal(){
  const card = document.getElementById("grpCard");
  try{ GROUPS = await GroupsAPI.list(); }catch{ GROUPS = []; }
  const esc = s => (s||"").replace(/[<>"]/g, c=>({'<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const ofDev = {}; GROUPS.forEach(g=>(g.devices||[]).forEach(id=>ofDev[id]=g.id));  // light -> its group
  const groupRows = GROUPS.length ? GROUPS.map(g=>`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <input value="${esc(g.name)}" data-grename="${g.id}" style="flex:1;box-sizing:border-box;padding:8px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:#fff;font-weight:600;font-size:14px">

        <button data-grdel="${g.id}" style="border:1px solid #6e2f2f;background:rgba(255,80,80,.12);color:#ff8a8a;border-radius:6px;padding:8px 12px;font-weight:600;cursor:pointer">Delete</button>
      </div>`).join("") : '<div style="color:#8a93b0;font-size:13px;padding:2px 0 8px">No groups yet — add one above.</div>';
  const optsFor = sel => `<option value=""${sel?'':' selected'}>Ungrouped</option>`+GROUPS.map(g=>`<option value="${g.id}"${g.id===sel?' selected':''}>${esc(g.name)}</option>`).join("");
  const lightRows = DEVICES.length ? DEVICES.map(d=>`
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid rgba(255,255,255,.06)">
        <span style="flex:1;min-width:0;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(d.deviceName)}</span>
        <select data-gassign="${d.device}" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:6px;color:#fff;font-size:13px;padding:7px 8px">${optsFor(ofDev[d.device])}</select>
      </div>`).join("") : '<div style="color:#8a93b0;font-size:13px">No lights loaded — open this on the live dashboard.</div>';
  card.innerHTML =
    '<div style="display:flex;align-items:center;margin-bottom:6px"><h2 style="margin:0;font-size:19px;font-weight:600;flex:1">Manage groups</h2><button id="grpClose" style="border:0;background:transparent;color:#8a93b0;font-size:20px;cursor:pointer">✕</button></div>'
    +'<p style="margin:0 0 14px;color:#aab;font-size:12.5px;line-height:1.5">Create groups, then set each light’s group below. A light belongs to one group at a time.</p>'
    +'<div style="display:flex;gap:8px;margin-bottom:18px"><input id="grpNew" placeholder="New group name (e.g. Living Room)" style="flex:1;box-sizing:border-box;padding:10px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:#fff;font-size:14px"><button id="grpAdd" style="padding:10px 16px;border-radius:6px;border:0;background:#4f7cff;color:#fff;font-weight:600;cursor:pointer">Add</button></div>'
    +'<div style="font-size:11.5px;color:#8a93b0;font-weight:700;letter-spacing:.5px;margin-bottom:9px">GROUPS</div>'+groupRows
    +'<div style="font-size:11.5px;color:#8a93b0;font-weight:700;letter-spacing:.5px;margin:18px 0 2px">ASSIGN LIGHTS</div>'+lightRows;
  card.querySelector("#grpClose").onclick = ()=> document.getElementById("grpOverlay").style.display="none";
  card.querySelector("#grpAdd").onclick = async ()=>{
    const name = card.querySelector("#grpNew").value.trim(); if(!name) return;
    await GroupsAPI.add(name); GROUPS = await GroupsAPI.list(); renderGroupsModal();
  };
}

    +'box-shadow:0 24px 70px -20px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.13)">'
    +'<h2 style="margin:0 0 4px;font-size:19px;font-weight:600">Connect to your lights</h2>'
    +'<p style="margin:0 0 16px;color:#aab;font-size:13px;line-height:1.5">The URL is pre-filled to this site. Enter your passcode and Save to connect to your real lights.</p>'
    +'<label style="display:block;font-size:12px;color:#ccd;margin-bottom:6px">Proxy URL</label>'
    +'<input id="cfgUrl" placeholder="https://your-app.up.railway.app" style="width:100%;box-sizing:border-box;padding:11px 13px;margin-bottom:14px;border-radius:12px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:#fff;font-size:14px">'
    +'<label style="display:block;font-size:12px;color:#ccd;margin-bottom:6px">Passcode</label>'
    +'<input id="cfgPass" type="password" placeholder="shared passcode" style="width:100%;box-sizing:border-box;padding:11px 13px;border-radius:12px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:#fff;font-size:14px">'
    +'<div id="cfgMsg" style="min-height:18px;font-size:12.5px;margin:8px 2px 14px;color:#9aa"></div>'
    +'<div style="display:flex;gap:10px">'
    +'<button id="cfgTest" style="flex:1;padding:11px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:#fff;font-weight:600;font-size:14px;cursor:pointer">Test</button>'
    +'<button id="cfgSave" style="flex:1;padding:11px;border-radius:12px;border:0;background:#4f7cff;color:#fff;font-weight:600;font-size:14px;cursor:pointer">Save</button></div>'
    +'<button id="cfgClose" style="width:100%;margin-top:10px;padding:9px;border-radius:12px;border:0;background:transparent;color:#8a93b0;font-size:13px;cursor:pointer">Cancel</button></div>';
  document.body.appendChild(ov);
  const $=s=>ov.querySelector(s), msg=$("#cfgMsg");
  const norm=v=>v.trim().replace(/\/+$/,"");
  gear.addEventListener("click",()=>{ $("#cfgUrl").value=cfg.proxyBase||(location.protocol.startsWith("http")?location.origin:""); $("#cfgPass").value=cfg.passcode||""; msg.textContent=""; ov.style.display="flex"; });
  const close=()=>ov.style.display="none";
  $("#cfgClose").addEventListener("click",close);
  ov.addEventListener("click",e=>{ if(e.target===ov) close(); });
  $("#cfgTest").addEventListener("click",async()=>{
    const base=norm($("#cfgUrl").value);
    if(!base){ msg.style.color="#9aa"; msg.textContent="No URL — staying in demo mode."; return; }
    msg.style.color="#9aa"; msg.textContent="Testing…";
    try{ const r=await fetch(base+"/health",{headers:{"X-Passcode":$("#cfgPass").value.trim()}}); const j=await r.json();
      if(j.ok){ msg.style.color="#5fd38a"; msg.textContent="Connected ✓  Govee:"+(j.govee?"on":"off")+"  AI:"+(j.ai?"on":"off")+"  automations:"+j.automations; }
      else { msg.style.color="#ffb4b4"; msg.textContent="Reached server but not OK."; }
    }catch{ msg.style.color="#ffb4b4"; msg.textContent="Couldn't reach it — check the URL / passcode."; }
  });
  $("#cfgSave").addEventListener("click",()=>{
    localStorage.setItem("gv_cfg",JSON.stringify({proxyBase:norm($("#cfgUrl").value),passcode:$("#cfgPass").value.trim(),live:true}));
    location.reload();
  });
})();

/* ---------- auto-update: reload once a new deploy is actually live ----------
   A cache-first service worker means a plain refresh normally just re-serves
   the SAME cached page — browsers only check for a new sw.js occasionally in
   the background, and even then, the new one doesn't take over until it's
   explicitly claimed. So: force an update check on load + whenever the tab
   regains focus, and the moment the new worker takes control, reload once
   automatically so the update actually shows up instead of silently sitting
   there until you happen to trigger a fresh-enough navigation. */
if("serviceWorker" in navigator){
  let refreshedOnce=false;
  navigator.serviceWorker.addEventListener("controllerchange", ()=>{
    if(refreshedOnce) return; refreshedOnce=true; location.reload();
  });
  navigator.serviceWorker.register("sw.js").then(reg=>{
    reg.update().catch(()=>{});
    document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) reg.update().catch(()=>{}); });
  }).catch(()=>{});
}
</script>
